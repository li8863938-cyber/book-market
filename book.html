<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>书籍详情 · 泰皋阁</title>



<style>
body { -webkit-font-smoothing: antialiased; }

.toast {
  position: fixed; bottom: 28px; left: 50%;
  transform: translateX(-50%) translateY(100px);
  padding: 12px 28px; border-radius: 12px;
  font-size: 14px; font-weight: 500; opacity: 0;
  transition: all .35s cubic-bezier(.4,0,.2,1);
  z-index: 200; pointer-events: none;
  box-shadow: 0 6px 24px rgba(0,0,0,.18);
  max-width: 90vw;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.success { background: #065f46; color: #fff; }
.toast.error   { background: #991b1b; color: #fff; }
.toast.info    { background: #1e293b; color: #fff; }

.spinner {
  width: 16px; height: 16px;
  border: 2.5px solid rgba(255,255,255,.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin .6s linear infinite;
  display: inline-block;
  vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }

.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(15,23,42,.45); z-index: 100;
  backdrop-filter: blur(4px); padding: 16px;
  overflow-y: auto;
}
.modal-overlay.open { display: flex; align-items: center; justify-content: center; }
.modal {
  background: #fff; border-radius: 16px;
  width: 100%; max-width: 420px;
  box-shadow: 0 8px 30px rgba(0,0,0,.12);
  animation: mIn .25s cubic-bezier(.4,0,.2,1);
}
@keyframes mIn {
  from { opacity: 0; transform: translateY(20px) scale(.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
</style>
</head>
<body class="bg-[#f5f7fa] text-gray-900 min-h-screen" style="font-family:system-ui,-apple-system,sans-serif">

<header class="sticky top-0 z-50 bg-white/88 backdrop-blur-md border-b border-gray-200">
<div class="max-w-6xl mx-auto px-4 sm:px-6 h-14 flex items-center justify-between">
  <a href="index.html" class="flex items-center gap-1.5 no-underline">
    <span class="text-lg">&#x1F3DB;&#xFE0F;</span>
    <span class="text-[19px] font-bold tracking-tight" style="background:linear-gradient(135deg,#2563eb,#4f46e5);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">&#x6CF0;&#x768A;&#x9601;</span>
    <span class="text-[10px] font-semibold text-white px-1.5 py-0.5 rounded" style="background:linear-gradient(135deg,#2563eb,#4f46e5)">&#x6821;&#x56ED;</span>
  </a>
  <div class="flex items-center gap-4">
    <a href="sell.html" class="text-sm text-gray-400 hover:text-indigo-600 transition-colors no-underline">&#x53D1;&#x5E03;</a>
    <a href="index.html" class="text-sm text-gray-400 hover:text-gray-600 transition-colors no-underline">&#x2190; &#x8FD4;&#x56DE;</a>
  </div>
</div>
</header>

<main class="max-w-4xl mx-auto px-4 py-8 sm:py-10">
  <div id="bookDetail" class="text-center py-20 text-gray-400">
    <p class="text-3xl mb-2">&#x1F4D6;</p>
    <p>&#x52A0;&#x8F7D;&#x4E2D;...</p>
  </div>
</main>

<div class="modal-overlay" id="orderModal">
  <div class="modal p-6">
    <div class="flex items-center justify-between mb-4">
      <h2 class="text-lg font-bold text-gray-900">&#x1F4E9; &#x53D1;&#x9001;&#x8D2D;&#x4E70;&#x8BF7;&#x6C42;</h2>
      <button onclick="closeOrderModal()" class="w-7 h-7 rounded-full bg-gray-100 hover:bg-gray-200 flex items-center justify-center text-gray-400 hover:text-gray-600 text-sm transition-all cursor-pointer">&#x2715;</button>
    </div>
    <p class="text-sm text-gray-500 mb-4" id="orderBookTitle">&#x300A;&#x4E66;&#x540D;&#x300B;</p>
    <label for="orderMessage" class="block text-xs font-medium text-gray-500 mb-1.5">&#x7559;&#x8A00;&#x7ED9;&#x5356;&#x5BB6; <span class="text-gray-300 font-normal">(&#x9009;&#x586B;)</span></label>
    <textarea id="orderMessage" rows="3" placeholder="你好，我在泰皋阁看到这本书，请问什么时间方便交易？" class="w-full px-3.5 py-2.5 bg-gray-50 border border-gray-200 rounded-xl text-sm outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 focus:bg-white transition-all resize-y"></textarea>
    <button onclick="submitOrder()" id="orderBtn" class="w-full mt-4 py-2.5 rounded-xl text-sm font-semibold text-white cursor-pointer transition-all disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2" style="background:linear-gradient(135deg,#2563eb,#4f46e5)">&#x786E;&#x8BA4;&#x53D1;&#x9001;</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* Supabase REST API */
var SUPABASE_URL = 'https://zqhzigukoidwcbhzkysk.supabase.co';
var SUPABASE_ANON_KEY = 'sb_pub…5iz7';

function supabaseHeaders(token) {
  return { 'apikey': SUPABASE_ANON_KEY, 'Authorization': '***' + (token || SUPABASE_ANON_KEY), 'Content-Type': 'application/json' };
}

function getStoredSession() {
  for (var key in localStorage) {
    if (key.indexOf('sb-') === 0 && key.indexOf('-auth-token') > 0) {
      try { var d = JSON.parse(localStorage.getItem(key)); if (d && d.access_token) return d; } catch(e) {}
    }
  }
  return null;
}

async function apiGet(path, token) {
  var res = await fetch(SUPABASE_URL + path, { headers: supabaseHeaders(token) });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return await res.json();
}

async function apiPost(path, body, token) {
  var res = await fetch(SUPABASE_URL + path, { method: 'POST', headers: supabaseHeaders(token), body: JSON.stringify(body) });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return await res.json();
}

var currentUser = null;
var currentBook = null;
var bookId = null;
var currentToken = null;

function showToast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + (type || 'info');
  void t.offsetWidth;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(function() { t.classList.remove('show'); }, 3000);
}

function escHtml(s) {
  if (!s) return '';
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function formatDate(iso) {
  if (!iso) return '';
  var d = new Date(iso);
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0') + ' ' + String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}

(function() {
  var params = new URLSearchParams(window.location.search);
  bookId = params.get('id');
  if (!bookId) {
    document.getElementById('bookDetail').innerHTML = '<div class="text-center py-20"><p class="text-3xl mb-2">\u26A0\uFE0F</p><p class="text-gray-400 mb-4">\u7F3A\u5C11\u4E66\u7C4D ID</p><a href="index.html" class="text-indigo-600 text-sm font-medium hover:text-indigo-700 transition-colors">\u2190 \u8FD4\u56DE\u9996\u9875</a></div>';
  }
})();

async function loadBook() {
  if (!bookId) return;
  try {
    var session = getStoredSession();
    if (session) {
      try {
        var userData = await apiGet('/auth/v1/user', session.access_token);
        if (userData && userData.id) { currentUser = userData; currentToken = session.access_token; }
      } catch(e) {}
    }
    var books = await apiGet('/rest/v1/books?id=eq.' + bookId + '&select=*');
    if (!books || books.length === 0) { showNotFound(); return; }
    currentBook = books[0];
    renderBook(currentBook);
  } catch (err) {
    console.error('\u52A0\u8F7D\u5931\u8D25:', err);
    document.getElementById('bookDetail').innerHTML = '<div class="text-center py-20"><p class="text-3xl mb-2">\u26A0\uFE0F</p><p class="text-gray-400 mb-4">\u52A0\u8F7D\u5931\u8D25\uFF0C\u8BF7\u68C0\u67E5\u7F51\u7EDC\u8FDE\u63A5</p><a href="index.html" class="text-indigo-600 text-sm font-medium hover:text-indigo-700 transition-colors">\u2190 \u8FD4\u56DE\u9996\u9875</a></div>';
  }
}

function showNotFound() {
  document.getElementById('bookDetail').innerHTML = '<div class="text-center py-20"><p class="text-3xl mb-2">\uD83D\uDCED</p><p class="text-gray-400 text-base mb-1">\u4E66\u7C4D\u4E0D\u5B58\u5728</p><p class="text-gray-300 text-xs mb-4">\u53EF\u80FD\u5DF2\u88AB\u5220\u9664\u6216\u94FE\u63A5\u9519\u8BEF</p><a href="index.html" class="inline-block px-5 py-2 rounded-xl text-sm font-semibold text-white no-underline" style="background:linear-gradient(135deg,#2563eb,#4f46e5)">\u2190 \u8FD4\u56DE\u4E66\u644A\u770B\u770B</a></div>';
}

function renderBook(book) {
  var isSold = book.status !== '\u5728\u552E';
  var isOwner = currentUser && currentUser.id === book.user_id;
  var timeStr = formatDate(book.created_at);

  var condStyles = {
    '\u5168\u65B0': 'bg-green-50 text-green-700 border border-green-200',
    '\u4E5D\u6210\u65B0': 'bg-blue-50 text-blue-700 border border-blue-200',
    '\u516B\u6210\u65B0': 'bg-amber-50 text-amber-700 border border-amber-200',
    '\u6709\u7B14\u8BB0': 'bg-orange-50 text-orange-700 border border-orange-200',
    '\u6709\u7834\u635F': 'bg-red-50 text-red-700 border border-red-200'
  };
  var condStyle = condStyles[book.condition] || 'bg-gray-50 text-gray-600 border border-gray-200';

  var coverHtml = book.cover_url
    ? '<img src="' + escHtml(book.cover_url) + '" alt="" class="w-full h-full object-cover" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'"><div class="hidden items-center justify-center h-full text-5xl" style="color:#6366f1">\uD83D\uDCDA</div>'
    : '<div class="flex items-center justify-center h-full text-5xl" style="color:#6366f1">\uD83D\uDCDA</div>';

  var btnHtml = '';
  if (isSold) {
    btnHtml = '<div class="px-6 py-3 bg-gray-100 rounded-xl text-center text-sm font-semibold text-gray-400 cursor-not-allowed">' + (book.status === '\u5DF2\u552E' ? '\uD83D\uDD34 \u5DF2\u552E\u51FA' : '\uD83D\uDCCC \u5DF2\u4E0B\u67B6') + '</div>';
  } else if (!currentUser) {
    btnHtml = '<a href="auth.html?redirect=book.html%3Fid%3D' + book.id + '" class="block text-center px-6 py-3 rounded-xl text-sm font-semibold text-white no-underline shadow-sm hover:shadow-md transition-all" style="background:linear-gradient(135deg,#2563eb,#4f46e5)">\uD83D\uDD11 \u767B\u5F55\u540E\u7533\u8BF7\u8D2D\u4E70</a>';
  } else if (isOwner) {
    btnHtml = '<div class="px-6 py-3 rounded-xl text-center text-sm font-semibold" style="background:#eef2ff;color:#6366f1">\uD83D\uDCD6 \u8FD9\u662F\u6211\u7684\u4E66</div>';
  } else {
    btnHtml = '<button onclick="openOrderModal()" class="w-full px-6 py-3 rounded-xl text-sm font-semibold text-white shadow-sm hover:shadow-md transition-all cursor-pointer" style="background:linear-gradient(135deg,#2563eb,#4f46e5)">\uD83D\uDCAC \u6211\u60F3\u8981\u8FD9\u672C\u4E66</button>';
  }

  document.getElementById('bookDetail').innerHTML =
    '<div class="bg-white rounded-2xl overflow-hidden border border-gray-200" style="box-shadow:0 1px 4px rgba(0,0,0,.04),0 1px 3px rgba(0,0,0,.06)">' +
      '<div class="flex flex-col md:flex-row">' +
        '<div class="md:w-80 md:min-h-[320px] h-72 relative overflow-hidden" style="background:linear-gradient(135deg,#eef2ff,#e0e7ff)">' + coverHtml +
          (isSold ? '<div class="absolute top-3 left-3 bg-red-500/90 text-white text-xs font-semibold px-2.5 py-1 rounded-md">' + (book.status === '\u5DF2\u552E' ? '\u5DF2\u552E' : '\u5DF2\u4E0B\u67B6') + '</div>' : '') +
        '</div>' +
        '<div class="flex-1 p-6 sm:p-8">' +
          '<h1 class="text-xl font-bold leading-snug text-gray-900">' + escHtml(book.title) + '</h1>' +
          '<p class="text-sm text-gray-500 mt-1">' + escHtml(book.author) + '</p>' +
          '<div class="flex items-baseline gap-3 mt-4">' +
            '<span class="text-3xl font-extrabold" style="color:#ef4444">\uFFE5' + parseFloat(book.price).toFixed(2).replace(/\.?0+$/, '') + '</span>' +
            (book.original_price ? '<span class="text-sm text-gray-300 line-through">\uFFE5' + parseFloat(book.original_price).toFixed(2).replace(/\.?0+$/, '') + '</span>' : '') +
          '</div>' +
          '<div class="flex flex-wrap gap-2 mt-3">' +
            '<span class="px-2.5 py-1 rounded-lg text-xs font-semibold ' + condStyle + '">' + book.condition + '</span>' +
            (book.location ? '<span class="px-2.5 py-1 rounded-lg text-xs font-semibold bg-gray-100 text-gray-600 border border-gray-200">\uD83D\uDCCD ' + book.location + '</span>' : '') +
            (book.publisher ? '<span class="px-2.5 py-1 rounded-lg text-xs font-semibold bg-gray-100 text-gray-600 border border-gray-200">\uD83C\uDFE2 ' + escHtml(book.publisher) + '</span>' : '') +
          '</div>' +
          '<div class="grid grid-cols-2 gap-3 mt-5 bg-gray-50 rounded-xl p-4">' +
            '<div><div class="text-[10px] text-gray-400 uppercase tracking-wide">\u552E\u4EF7</div><div class="text-sm font-bold text-red-500 mt-0.5">\uFFE5' + book.price + '</div></div>' +
            '<div><div class="text-[10px] text-gray-400 uppercase tracking-wide">\u54C1\u76F8</div><div class="text-sm font-bold mt-0.5">' + book.condition + '</div></div>' +
            (book.location ? '<div><div class="text-[10px] text-gray-400 uppercase tracking-wide">\u4EA4\u6613\u5730\u70B9</div><div class="text-sm font-bold mt-0.5">' + book.location + '</div></div>' : '') +
            '<div><div class="text-[10px] text-gray-400 uppercase tracking-wide">\u53D1\u5E03\u65F6\u95F4</div><div class="text-sm font-bold mt-0.5">' + timeStr + '</div></div>' +
          '</div>' +
          (book.isbn ? '<p class="text-xs text-gray-400 mt-3 flex items-center gap-1">\uD83D\uDCD6 ISBN: ' + escHtml(book.isbn) + '</p>' : '') +
          (book.description ? '<div class="mt-4 pt-4 border-t border-gray-100"><div class="text-xs font-semibold text-gray-500 mb-1.5">\uD83D\uDCDD \u63CF\u8FF0</div><p class="text-sm text-gray-700 leading-relaxed whitespace-pre-wrap">' + escHtml(book.description) + '</p></div>' : '') +
          (book.contact ? '<div class="mt-4 pt-4 border-t border-gray-100"><div class="text-xs font-semibold text-gray-500 mb-1.5">\uD83D\uDCDE \u5356\u5BB6\u8054\u7CFB\u65B9\u5F0F</div><p class="text-sm font-bold" style="color:#4f46e5">' + escHtml(book.contact) + '</p></div>' : '') +
          '<div class="mt-6">' + btnHtml + '</div>' +
        '</div>' +
      '</div>' +
    '</div>';
}

function openOrderModal() {
  if (!currentBook) return;
  document.getElementById('orderBookTitle').textContent = '\u300A' + currentBook.title + '\u300B';
  document.getElementById('orderMessage').value = '';
  var btn = document.getElementById('orderBtn');
  btn.disabled = false;
  btn.innerHTML = '\u786E\u8BA4\u53D1\u9001';
  document.getElementById('orderModal').classList.add('open');
}

function closeOrderModal() {
  document.getElementById('orderModal').classList.remove('open');
}

async function submitOrder() {
  if (!currentUser || !currentBook || !currentToken) return;
  var btn = document.getElementById('orderBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> \u53D1\u9001\u4E2D...';
  var message = document.getElementById('orderMessage').value.trim();
  try {
    await apiPost('/rest/v1/orders', {
      book_id: currentBook.id,
      buyer_id: currentUser.id,
      seller_id: currentBook.user_id,
      status: '\u5F85\u786E\u8BA4',
      message: message || null,
      created_at: new Date().toISOString()
    }, currentToken);
    closeOrderModal();
    showToast('\u2705 \u5DF2\u53D1\u9001\u8D2D\u4E70\u8BF7\u6C42\uFF0C\u7B49\u5F85\u5356\u5BB6\u786E\u8BA4', 'success');
  } catch (err) {
    console.error('\u4E0B\u5355\u5931\u8D25:', err);
    showToast('\u274C \u53D1\u9001\u5931\u8D25\uFF1A' + (err.message || '\u672A\u77E5\u9519\u8BEF'), 'error');
    btn.disabled = false;
    btn.innerHTML = '\u786E\u8BA4\u53D1\u9001';
  }
}

document.getElementById('orderModal').addEventListener('click', function(e) { if (e.target === this) closeOrderModal(); });
document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeOrderModal(); });

loadBook();
</script>


<script src="https://cdn.tailwindcss.com"></script>
<script>try{tailwind.config={theme:{extend:{fontFamily:{sans:['system-ui','-apple-system','Segoe UI','Roboto','sans-serif']},colors:{brand:{50:'#eef2ff',100:'#e0e7ff',200:'#c7d2fe',300:'#a5b4fc',500:'#6366f1',600:'#4f46e5',700:'#4338ca'}}}}}}catch(e){}</script>
</body>
</html>
