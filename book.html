<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>书籍详情 · 泰皋阁</title>

<!-- Tailwind CSS + Inter 字体（无 Supabase CDN） -->
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: { sans: ['Inter', 'Noto Sans SC', 'system-ui', 'sans-serif'] },
      colors: { brand: { 50: '#eef2ff', 100: '#e0e7ff', 200: '#c7d2fe', 300: '#a5b4fc', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca' } }
    }
  }
}
</script>

<style>
body { -webkit-font-smoothing: antialiased; }

.toast {
  position: fixed; bottom: 28px; left: 50%;
  transform: translateX(-50%) translateY(100px);
  padding: 12px 28px; border-radius: 12px;
  font-size: 14px; font-weight: 500; opacity: 0;
  transition: all .35s cubic-bezier(.4,0,.2,1);
  z-index: 200; pointer-events: none;
  box-shadow: 0 6px 24px rgba(0,0,0,.18);
  max-width: 90vw;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.success { background: #065f46; color: #fff; }
.toast.error   { background: #991b1b; color: #fff; }
.toast.info    { background: #1e293b; color: #fff; }

.spinner {
  width: 16px; height: 16px;
  border: 2.5px solid rgba(255,255,255,.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin .6s linear infinite;
  display: inline-block;
  vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* 弹窗 */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(15,23,42,.45); z-index: 100;
  backdrop-filter: blur(4px); padding: 16px;
  overflow-y: auto;
}
.modal-overlay.open { display: flex; align-items: center; justify-content: center; }
.modal {
  background: #fff; border-radius: 16px;
  width: 100%; max-width: 420px;
  box-shadow: 0 8px 30px rgba(0,0,0,.12);
  animation: mIn .25s cubic-bezier(.4,0,.2,1);
}
@keyframes mIn {
  from { opacity: 0; transform: translateY(20px) scale(.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
</style>
</head>
<body class="bg-[#f5f7fa] font-sans text-gray-900 min-h-screen">

<!-- ====== 导航栏 ====== -->
<header class="sticky top-0 z-50 bg-white/88 backdrop-blur-md border-b border-gray-200">
<div class="max-w-6xl mx-auto px-4 sm:px-6 h-14 flex items-center justify-between">
  <a href="index.html" class="flex items-center gap-1.5 no-underline">
    <span class="text-lg">🏛️</span>
    <span class="text-[19px] font-bold tracking-tight bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent">泰皋阁</span>
    <span class="text-[10px] font-semibold bg-gradient-to-r from-blue-600 to-indigo-600 text-white px-1.5 py-0.5 rounded" style="-webkit-text-fill-color:#fff;">校园</span>
  </a>
  <div class="flex items-center gap-4">
    <a href="sell.html" class="text-sm text-gray-400 hover:text-brand-600 transition-colors no-underline">发布</a>
    <a href="index.html" class="text-sm text-gray-400 hover:text-gray-600 transition-colors no-underline">← 返回</a>
  </div>
</div>
</header>

<!-- ====== 主内容区 ====== -->
<main class="max-w-4xl mx-auto px-4 py-8 sm:py-10">
  <div id="bookDetail" class="text-center py-20 text-gray-400">
    <p class="text-3xl mb-2">⏳</p>
    <p>加载中...</p>
  </div>
</main>

<!-- ====== 下单弹窗 ====== -->
<div class="modal-overlay" id="orderModal">
  <div class="modal p-6">
    <div class="flex items-center justify-between mb-4">
      <h2 class="text-lg font-bold text-gray-900">📩 发送购买请求</h2>
      <button onclick="closeOrderModal()"
              class="w-7 h-7 rounded-full bg-gray-100 hover:bg-gray-200 flex items-center justify-center text-gray-400 hover:text-gray-600 text-sm transition-all cursor-pointer">✕</button>
    </div>
    <p class="text-sm text-gray-500 mb-4" id="orderBookTitle">《书名》</p>
    <label for="orderMessage" class="block text-xs font-medium text-gray-500 mb-1.5">留言给卖家 <span class="text-gray-300 font-normal">(选填)</span></label>
    <textarea id="orderMessage" rows="3"
              placeholder="例：你好，我在泰皋阁看到这本书，请问什么时间方便交易？"
              class="w-full px-3.5 py-2.5 bg-gray-50 border border-gray-200 rounded-xl text-sm outline-none focus:border-brand-500 focus:ring-2 focus:ring-brand-500/20 focus:bg-white transition-all resize-y"></textarea>
    <button onclick="submitOrder()" id="orderBtn"
            class="w-full mt-4 py-2.5 rounded-xl text-sm font-semibold text-white bg-gradient-to-r from-blue-600 to-indigo-600 hover:shadow-lg hover:shadow-indigo-500/25 transition-all disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2 cursor-pointer">
      确认发送
    </button>
  </div>
</div>

<!-- ====== Toast ====== -->
<div class="toast" id="toast"></div>

<script>
/* =============================================================
 * Supabase REST API 配置（无需外部 SDK CDN）
 * ============================================================= */
var SUPABASE_URL = 'https://zqhzigukoidwcbhzkysk.supabase.co';
var SUPABASE_ANON_KEY = 'sb_publishable_i03mX2MB2rd3b1TTrTZXbg_tvYL5iz7';

function supabaseHeaders(token) {
  return { 'apikey': SUPABASE_ANON_KEY, 'Authorization': 'Bearer ' + (token || SUPABASE_ANON_KEY), 'Content-Type': 'application/json' };
}

/* 从 localStorage 读取 session */
function getStoredSession() {
  for (var key in localStorage) {
    if (key.indexOf('sb-') === 0 && key.indexOf('-auth-token') > 0) {
      try { var d = JSON.parse(localStorage.getItem(key)); if (d && d.access_token) return d; } catch(e) {}
    }
  }
  return null;
}

/* 通用 GET */
async function apiGet(path, token) {
  var res = await fetch(SUPABASE_URL + path, { headers: supabaseHeaders(token) });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return await res.json();
}

/* 通用 POST */
async function apiPost(path, body, token) {
  var res = await fetch(SUPABASE_URL + path, {
    method: 'POST',
    headers: supabaseHeaders(token),
    body: JSON.stringify(body),
  });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return await res.json();
}

/* =============================================================
 * 状态变量
 * ============================================================= */
var currentUser = null;
var currentBook = null;
var bookId = null;
var currentToken = null;

/* =============================================================
 * 工具函数
 * ============================================================= */
function showToast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + (type || 'info');
  void t.offsetWidth;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(function() { t.classList.remove('show'); }, 3000);
}

function escHtml(s) {
  if (!s) return '';
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function formatDate(iso) {
  if (!iso) return '';
  var d = new Date(iso);
  return d.getFullYear() + '-' +
    String(d.getMonth() + 1).padStart(2, '0') + '-' +
    String(d.getDate()).padStart(2, '0') + ' ' +
    String(d.getHours()).padStart(2, '0') + ':' +
    String(d.getMinutes()).padStart(2, '0');
}

/* =============================================================
 * 页面初始化：解析 URL 参数
 * ============================================================= */
(function() {
  var params = new URLSearchParams(window.location.search);
  bookId = params.get('id');
  if (!bookId) {
    document.getElementById('bookDetail').innerHTML =
      '<div class="text-center py-20"><p class="text-3xl mb-2">⚠️</p><p class="text-gray-400 mb-4">缺少书籍 ID</p><a href="index.html" class="text-brand-600 text-sm font-medium hover:text-brand-700 transition-colors">← 返回首页</a></div>';
  }
})();

/* =============================================================
 * 加载书籍详情
 * ============================================================= */
async function loadBook() {
  if (!bookId) return;

  try {
    // 读取 session（不强制登录）
    var session = getStoredSession();
    if (session) {
      // 验证 session 并获取用户信息
      try {
        var userData = await apiGet('/auth/v1/user', session.access_token);
        if (userData && userData.id) {
          currentUser = userData;
          currentToken = session.access_token;
        }
      } catch(e) {}
    }

    // REST API 查询书籍详情
    var books = await apiGet('/rest/v1/books?id=eq.' + bookId + '&select=*');

    if (!books || books.length === 0) {
      showNotFound();
      return;
    }

    currentBook = books[0];
    renderBook(currentBook);

  } catch (err) {
    console.error('加载失败:', err);
    if (err.message && err.message.indexOf('PGRST116') >= 0) {
      showNotFound();
    } else {
      document.getElementById('bookDetail').innerHTML =
        '<div class="text-center py-20"><p class="text-3xl mb-2">⚠️</p><p class="text-gray-400 mb-4">加载失败，请检查网络连接</p><a href="index.html" class="text-brand-600 text-sm font-medium hover:text-brand-700 transition-colors">← 返回首页</a></div>';
    }
  }
}

/* =============================================================
 * 显示"书籍不存在"
 * ============================================================= */
function showNotFound() {
  document.getElementById('bookDetail').innerHTML =
    '<div class="text-center py-20"><p class="text-3xl mb-2">📭</p><p class="text-gray-400 text-base mb-1">书籍不存在</p><p class="text-gray-300 text-xs mb-4">可能已被删除或链接错误</p><a href="index.html" class="inline-block px-5 py-2 rounded-xl text-sm font-semibold text-white bg-gradient-to-r from-blue-600 to-indigo-600 hover:shadow-lg transition-all no-underline">← 返回书摊看看</a></div>';
}

/* =============================================================
 * 渲染书籍详情
 * ============================================================= */
function renderBook(book) {
  var isSold = book.status !== '在售';
  var isOwner = currentUser && currentUser.id === book.user_id;
  var timeStr = formatDate(book.created_at);

  var condStyles = {
    '全新':   'bg-green-50 text-green-700 border border-green-200',
    '九成新': 'bg-blue-50 text-blue-700 border border-blue-200',
    '八成新': 'bg-amber-50 text-amber-700 border border-amber-200',
    '有笔记': 'bg-orange-50 text-orange-700 border border-orange-200',
    '有破损': 'bg-red-50 text-red-700 border border-red-200',
  };
  var condStyle = condStyles[book.condition] || 'bg-gray-50 text-gray-600 border border-gray-200';

  var coverHtml = book.cover_url
    ? '<img src="' + escHtml(book.cover_url) + '" alt="封面" class="w-full h-full object-cover" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'"><div class="hidden items-center justify-center h-full text-5xl text-brand-500">📚</div>'
    : '<div class="flex items-center justify-center h-full text-5xl text-brand-500">📚</div>';

  /* 按钮逻辑 */
  var btnHtml = '';
  if (isSold) {
    btnHtml = '<div class="px-6 py-3 bg-gray-100 rounded-xl text-center text-sm font-semibold text-gray-400 cursor-not-allowed">' +
      (book.status === '已售' ? '🔴 已售出' : '📌 已下架') + '</div>';
  } else if (!currentUser) {
    btnHtml = '<a href="auth.html?redirect=book.html%3Fid%3D' + book.id + '" class="block text-center px-6 py-3 rounded-xl text-sm font-semibold text-white bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 shadow-sm hover:shadow-md transition-all no-underline">🔑 登录后申请购买</a>';
  } else if (isOwner) {
    btnHtml = '<div class="px-6 py-3 bg-brand-50 rounded-xl text-center text-sm font-semibold text-brand-600">📖 这是我的书</div>';
  } else {
    btnHtml = '<button onclick="openOrderModal()" class="w-full px-6 py-3 rounded-xl text-sm font-semibold text-white bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 shadow-sm hover:shadow-md transition-all cursor-pointer">💬 我想要这本书</button>';
  }

  document.getElementById('bookDetail').innerHTML =
    '<div class="bg-white rounded-2xl shadow-[0_1px_4px_rgba(0,0,0,.04),0_1px_3px_rgba(0,0,0,.06)] border border-gray-200 overflow-hidden">' +
      '<div class="flex flex-col md:flex-row">' +
        /* 左侧封面 */
        '<div class="md:w-80 md:min-h-[320px] h-72 bg-gradient-to-br from-brand-50 to-indigo-50 relative overflow-hidden">' +
          coverHtml +
          (isSold ? '<div class="absolute top-3 left-3 bg-red-500/90 text-white text-xs font-semibold px-2.5 py-1 rounded-md backdrop-blur-sm">' +
            (book.status === '已售' ? '已售' : '已下架') + '</div>' : '') +
        '</div>' +
        /* 右侧信息 */
        '<div class="flex-1 p-6 sm:p-8">' +
          '<h1 class="text-xl font-bold leading-snug text-gray-900">' + escHtml(book.title) + '</h1>' +
          '<p class="text-sm text-gray-500 mt-1">' + escHtml(book.author) + '</p>' +
          '<div class="flex items-baseline gap-3 mt-4">' +
            '<span class="text-3xl font-extrabold text-red-500">￥' + parseFloat(book.price).toFixed(2).replace(/\.?0+$/, '') + '</span>' +
            (book.original_price ? '<span class="text-sm text-gray-300 line-through">￥' + parseFloat(book.original_price).toFixed(2).replace(/\.?0+$/, '') + '</span>' : '') +
          '</div>' +
          '<div class="flex flex-wrap gap-2 mt-3">' +
            '<span class="px-2.5 py-1 rounded-lg text-xs font-semibold ' + condStyle + '">' + book.condition + '</span>' +
            (book.location ? '<span class="px-2.5 py-1 rounded-lg text-xs font-semibold bg-gray-100 text-gray-600 border border-gray-200">📍 ' + book.location + '</span>' : '') +
            (book.publisher ? '<span class="px-2.5 py-1 rounded-lg text-xs font-semibold bg-gray-100 text-gray-600 border border-gray-200">🏢 ' + escHtml(book.publisher) + '</span>' : '') +
          '</div>' +
          '<div class="grid grid-cols-2 gap-3 mt-5 bg-gray-50 rounded-xl p-4">' +
            '<div><div class="text-[10px] text-gray-400 uppercase tracking-wide">售价</div><div class="text-sm font-bold text-red-500 mt-0.5">￥' + book.price + '</div></div>' +
            '<div><div class="text-[10px] text-gray-400 uppercase tracking-wide">品相</div><div class="text-sm font-bold mt-0.5">' + book.condition + '</div></div>' +
            (book.location ? '<div><div class="text-[10px] text-gray-400 uppercase tracking-wide">交易地点</div><div class="text-sm font-bold mt-0.5">' + book.location + '</div></div>' : '') +
            '<div><div class="text-[10px] text-gray-400 uppercase tracking-wide">发布时间</div><div class="text-sm font-bold mt-0.5">' + timeStr + '</div></div>' +
          '</div>' +
          (book.isbn ? '<p class="text-xs text-gray-400 mt-3 flex items-center gap-1">📖 ISBN：' + escHtml(book.isbn) + '</p>' : '') +
          (book.description ? '<div class="mt-4 pt-4 border-t border-gray-100"><div class="text-xs font-semibold text-gray-500 mb-1.5">📝 描述</div><p class="text-sm text-gray-700 leading-relaxed whitespace-pre-wrap">' + escHtml(book.description) + '</p></div>' : '') +
          (book.contact ? '<div class="mt-4 pt-4 border-t border-gray-100"><div class="text-xs font-semibold text-gray-500 mb-1.5">📞 卖家联系方式</div><p class="text-sm font-bold text-brand-600">' + escHtml(book.contact) + '</p></div>' : '') +
          '<div class="mt-6">' + btnHtml + '</div>' +
        '</div>' +
      '</div>' +
    '</div>';
}

/* =============================================================
 * 下单弹窗
 * ============================================================= */
function openOrderModal() {
  if (!currentBook) return;
  document.getElementById('orderBookTitle').textContent = '《' + currentBook.title + '》';
  document.getElementById('orderMessage').value = '';
  var btn = document.getElementById('orderBtn');
  btn.disabled = false;
  btn.innerHTML = '确认发送';
  document.getElementById('orderModal').classList.add('open');
}

function closeOrderModal() {
  document.getElementById('orderModal').classList.remove('open');
}

/* =============================================================
 * 提交订单（REST API）
 * ============================================================= */
async function submitOrder() {
  if (!currentUser || !currentBook || !currentToken) return;

  var btn = document.getElementById('orderBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> 发送中...';

  var message = document.getElementById('orderMessage').value.trim();

  try {
    await apiPost('/rest/v1/orders', {
      book_id: currentBook.id,
      buyer_id: currentUser.id,
      seller_id: currentBook.user_id,
      status: '待确认',
      message: message || null,
      created_at: new Date().toISOString(),
    }, currentToken);

    closeOrderModal();
    showToast('✅ 已发送购买请求，等待卖家确认', 'success');
  } catch (err) {
    console.error('下单失败:', err);
    showToast('❌ 发送失败：' + (err.message || '未知错误'), 'error');
    btn.disabled = false;
    btn.innerHTML = '确认发送';
  }
}

/* =============================================================
 * 弹窗关闭事件
 * ============================================================= */
document.getElementById('orderModal').addEventListener('click', function(e) {
  if (e.target === this) closeOrderModal();
});
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeOrderModal();
});

/* =============================================================
 * 启动
 * ============================================================= */
loadBook();
</script>

</body>
</html>
