<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>书籍详情 · 泰皋阁</title>

<!-- CDN 备注：国内网络下可能需要 VPN -->
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: { sans: ['Inter', 'Noto Sans SC', 'system-ui', 'sans-serif'] },
      colors: { brand: { 50: '#eef2ff', 100: '#e0e7ff', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca' } }
    }
  }
}
</script>

<style>
body { -webkit-font-smoothing: antialiased; }
.toast {
  position: fixed; bottom: 28px; left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: #1e293b; color: #fff;
  padding: 10px 24px; border-radius: 10px;
  font-size: 14px; opacity: 0;
  transition: all .35s cubic-bezier(.4,0,.2,1);
  z-index: 200; pointer-events: none;
  box-shadow: 0 4px 16px rgba(0,0,0,.18);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.error { background: #dc2626; }
.toast.success { background: #059669; }
.spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite; display: inline-block; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:100;backdrop-filter:blur(4px);padding:16px;overflow-y:auto}
.modal-overlay.open{display:flex;align-items:center;justify-content:center}
.modal{background:#fff;border-radius:16px;width:100%;max-width:420px;box-shadow:0 8px 30px rgba(0,0,0,.12);animation:mIn .25s cubic-bezier(.4,0,.2,1)}
@keyframes mIn{from{opacity:0;transform:translateY(20px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
</style>
</head>
<body class="bg-[#f5f7fa] font-sans text-gray-900 min-h-screen">

<!-- ====== Supabase 配置 ====== -->
<script>
const SUPABASE_URL = 'https://zqhzigukoikdwcbhzkysk.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbG…khdQ';

let supabase = null;
try {
  if (typeof createClient === 'function') {
    supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  }
} catch(e) { supabase = null; }

let currentUser = null;
let currentBook = null;
let bookId = null;

function showToast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (type ? ' ' + type : '');
  void t.offsetWidth;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(function() { t.classList.remove('show'); }, 3000);
}

// ====== 页面加载：获取书籍 ID ======
(function() {
  var params = new URLSearchParams(window.location.search);
  bookId = params.get('id');
  if (!bookId) {
    document.getElementById('bookDetail').innerHTML = '<div class="text-center py-20 text-gray-400"><p>❌ 缺少书籍 ID</p><a href="index.html" class="text-brand-600 text-sm mt-2 inline-block">返回首页</a></div>';
    return;
  }
})();
</script>

<!-- ====== 导航 ====== -->
<header class="sticky top-0 z-50 bg-white/80 backdrop-blur-lg border-b border-gray-100">
<div class="max-w-6xl mx-auto px-4 sm:px-6 h-14 flex items-center justify-between">
  <a href="index.html" class="flex items-center gap-1.5 no-underline">
    <span class="text-xl">🏛️</span>
    <span class="text-lg font-bold bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent">泰皋阁</span>
  </a>
  <a href="index.html" class="text-sm text-gray-400 hover:text-gray-600 transition-colors">← 返回</a>
</div>
</header>

<!-- ====== 书籍详情 ====== -->
<main class="max-w-4xl mx-auto px-4 py-10">
  <div id="bookDetail" class="text-center py-20 text-gray-400"><p>⏳ 加载中...</p></div>
</main>

<!-- ====== 下单弹窗 ====== -->
<div class="modal-overlay" id="orderModal">
  <div class="modal p-6">
    <div class="flex items-center justify-between mb-4">
      <h2 class="text-lg font-bold">📩 发送购买请求</h2>
      <button onclick="closeOrderModal()" class="w-7 h-7 rounded-full bg-gray-100 hover:bg-gray-200 flex items-center justify-center text-gray-400 hover:text-gray-600 text-sm transition-all">✕</button>
    </div>
    <p class="text-sm text-gray-500 mb-4" id="orderBookTitle">《书名》</p>
    <textarea id="orderMessage" rows="3" class="w-full px-3.5 py-2.5 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:border-brand-500 focus:ring-2 focus:ring-brand-500/20 transition-all resize-y" placeholder="给卖家留言（选填）"></textarea>
    <button onclick="submitOrder()" id="orderBtn" class="w-full mt-4 py-2.5 rounded-xl text-sm font-semibold text-white bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 shadow-sm hover:shadow-md transition-all disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2">
      确认发送
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ====== 初始化 ======
async function init() {
  if (!supabase || !bookId) return;

  try {
    // ====== 获取当前用户 ======
    var sessionRes = await supabase.auth.getSession();
    if (sessionRes.data && sessionRes.data.session) {
      currentUser = sessionRes.data.session.user;
    }

    // ====== 从 books 表查询书籍 ======
    var bookRes = await supabase
      .from('books')
      .select('*')
      .eq('id', bookId)
      .single();

    if (bookRes.error) {
      document.getElementById('bookDetail').innerHTML = '<div class="text-center py-20 text-gray-400"><p>❌ ' + bookRes.error.message + '</p><a href="index.html" class="text-brand-600 text-sm mt-2 inline-block">返回首页</a></div>';
      return;
    }

    currentBook = bookRes.data;
    renderBookDetail(currentBook);

  } catch (err) {
    document.getElementById('bookDetail').innerHTML = '<div class="text-center py-20 text-gray-400"><p>❌ 加载失败</p><a href="index.html" class="text-brand-600 text-sm mt-2 inline-block">返回首页</a></div>';
  }
}

// ====== 渲染书籍详情 ======
function renderBookDetail(book) {
  var isSold = book.status !== '在售';
  var isOwner = currentUser && currentUser.id === book.user_id;

  // 格式化时间
  var timeStr = '';
  if (book.created_at) {
    var d = new Date(book.created_at);
    timeStr = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }

  // 品相样式
  var condColor = {
    '全新': 'bg-green-50 text-green-700',
    '九成新': 'bg-blue-50 text-blue-700',
    '八成新': 'bg-amber-50 text-amber-700',
    '有笔记': 'bg-orange-50 text-orange-700',
    '有破损': 'bg-red-50 text-red-700',
  }[book.condition] || 'bg-gray-50 text-gray-600';

  // 封面图
  var coverHtml = book.cover_url
    ? '<img src="' + book.cover_url + '" alt="封面" class="w-full h-full object-cover">'
    : '<div class="flex items-center justify-center h-full text-5xl text-brand-500">📚</div>';

  // 按钮状态
  var btnHtml = '';
  if (isSold) {
    btnHtml = '<div class="px-6 py-3 bg-gray-100 rounded-xl text-center text-sm font-semibold text-gray-400 cursor-not-allowed">' + (book.status === '已售' ? '📕 已售出' : '📕 已下架') + '</div>';
  } else if (!currentUser) {
    btnHtml = '<a href="auth.html" class="block text-center px-6 py-3 rounded-xl text-sm font-semibold text-white bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 shadow-sm transition-all">🔑 登录后申请购买</a>';
  } else if (isOwner) {
    btnHtml = '<div class="px-6 py-3 bg-brand-50 rounded-xl text-center text-sm font-semibold text-brand-600">这是我的书</div>';
  } else {
    btnHtml = '<button onclick="openOrderModal()" class="w-full px-6 py-3 rounded-xl text-sm font-semibold text-white bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 shadow-sm hover:shadow-md transition-all">📩 我想要这本书</button>';
  }

  document.getElementById('bookDetail').innerHTML =
    '<div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">' +
      '<div class="flex flex-col md:flex-row">' +
        // ====== 左侧封面 ======
        '<div class="md:w-80 h-80 bg-gradient-to-br from-brand-50 to-indigo-50 relative">' +
          coverHtml +
          (isSold ? '<div class="absolute top-3 left-3 bg-red-500 text-white text-xs font-semibold px-2.5 py-1 rounded">已' + (book.status === '已售' ? '售' : '下架') + '</div>' : '') +
        '</div>' +
        // ====== 右侧信息 ======
        '<div class="flex-1 p-6 md:p-8">' +
          '<h1 class="text-xl font-bold leading-snug">' + escHtml(book.title) + '</h1>' +
          '<p class="text-sm text-gray-500 mt-1">' + escHtml(book.author) + '</p>' +

          '<div class="flex items-baseline gap-3 mt-4">' +
            '<span class="text-3xl font-extrabold text-red-500">¥' + book.price + '</span>' +
            (book.original_price ? '<span class="text-sm text-gray-300 line-through">¥' + book.original_price + '</span>' : '') +
          '</div>' +

          '<div class="flex flex-wrap gap-2 mt-3">' +
            '<span class="px-2.5 py-1 rounded-lg text-xs font-semibold ' + condColor + '">' + book.condition + '</span>' +
            (book.location ? '<span class="px-2.5 py-1 rounded-lg text-xs font-semibold bg-gray-100 text-gray-600">📍 ' + book.location + '</span>' : '') +
            (book.publisher ? '<span class="px-2.5 py-1 rounded-lg text-xs font-semibold bg-gray-100 text-gray-600">🏢 ' + book.publisher + '</span>' : '') +
          '</div>' +

          '<div class="grid grid-cols-2 gap-3 mt-5 bg-gray-50 rounded-xl p-4">' +
            '<div><div class="text-[10px] text-gray-400">售价</div><div class="text-sm font-bold text-red-500 mt-0.5">¥' + book.price + '</div></div>' +
            '<div><div class="text-[10px] text-gray-400">品相</div><div class="text-sm font-bold mt-0.5">' + book.condition + '</div></div>' +
            (book.location ? '<div><div class="text-[10px] text-gray-400">交易地点</div><div class="text-sm font-bold mt-0.5">' + book.location + '</div></div>' : '') +
            '<div><div class="text-[10px] text-gray-400">发布时间</div><div class="text-sm font-bold mt-0.5">' + timeStr + '</div></div>' +
          '</div>' +

          (book.isbn ? '<p class="text-xs text-gray-400 mt-3">🔖 ISBN：' + book.isbn + '</p>' : '') +

          (book.description ? '<div class="mt-4 pt-4 border-t border-gray-100"><div class="text-xs font-semibold text-gray-500 mb-1.5">📝 描述</div><p class="text-sm text-gray-700 leading-relaxed">' + escHtml(book.description) + '</p></div>' : '') +

          (book.contact ? '<div class="mt-4 pt-4 border-t border-gray-100"><div class="text-xs font-semibold text-gray-500 mb-1.5">👤 卖家联系方式</div><p class="text-sm font-bold text-brand-600">' + escHtml(book.contact) + '</p></div>' : '') +

          // 底部按钮
          '<div class="mt-6">' + btnHtml + '</div>' +
        '</div>' +
      '</div>' +
    '</div>';
}

function escHtml(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// ====== 下单弹窗 ======
function openOrderModal() {
  if (!currentBook) return;
  document.getElementById('orderBookTitle').textContent = '《' + currentBook.title + '》';
  document.getElementById('orderMessage').value = '';
  document.getElementById('orderBtn').disabled = false;
  document.getElementById('orderBtn').innerHTML = '确认发送';
  document.getElementById('orderModal').classList.add('open');
}

function closeOrderModal() {
  document.getElementById('orderModal').classList.remove('open');
}

// ====== 提交订单 ======
async function submitOrder() {
  if (!supabase || !currentUser || !currentBook) return;

  var btn = document.getElementById('orderBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> 发送中...';

  var message = document.getElementById('orderMessage').value.trim();

  try {
    // ====== 插入 orders 表 ======
    var { data, error } = await supabase
      .from('orders')
      .insert({
        book_id: currentBook.id,
        buyer_id: currentUser.id,
        seller_id: currentBook.user_id,
        status: '待确认',
        message: message,
        created_at: new Date().toISOString(),
      });

    if (error) {
      showToast('❌ 发送失败：' + error.message, 'error');
      btn.disabled = false;
      btn.innerHTML = '确认发送';
      return;
    }

    // 成功
    closeOrderModal();
    showToast('✅ 已发送购买请求，等待卖家确认', 'success');

  } catch (err) {
    showToast('❌ 网络异常，请检查连接', 'error');
    btn.disabled = false;
    btn.innerHTML = '确认发送';
  }
}

// ====== 关闭弹窗（点击背景 & ESC） ======
document.getElementById('orderModal').addEventListener('click', function(e) {
  if (e.target === this) closeOrderModal();
});
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeOrderModal();
});

// ====== 启动 ======
init();
</script>

</body>
</html>
