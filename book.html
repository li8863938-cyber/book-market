<div class="toast" id="toast"></div>

<script>
/* =============================================================
 * Supabase REST API й…ҚзҪ®пјҲж— йңҖеӨ–йғЁ SDK CDNпј? * ============================================================= */
var SUPABASE_URL = 'https://zqhzigukoidwcbhzkysk.supabase.co';
var SUPABASE_ANON_KEY = 'sb_publishable_i03mX2MB2rd3b1TTrTZXbg_tvYL5iz7';

function supabaseHeaders(token) {
  return { 'apikey': SUPABASE_ANON_KEY, 'Authorization': 'Bearer ' + (token || SUPABASE_ANON_KEY), 'Content-Type': 'application/json' };
}

/* д»?localStorage иҜ»еҸ– session */
function getStoredSession() {
  for (var key in localStorage) {
    if (key.indexOf('sb-') === 0 && key.indexOf('-auth-token') > 0) {
      try { var d = JSON.parse(localStorage.getItem(key)); if (d && d.access_token) return d; } catch(e) {}
    }
  }
  return null;
}

/* йҖҡз”Ё GET */
async function apiGet(path, token) {
  var res = await fetch(SUPABASE_URL + path, { headers: supabaseHeaders(token) });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return await res.json();
}

/* йҖҡз”Ё POST */
async function apiPost(path, body, token) {
  var res = await fetch(SUPABASE_URL + path, {
    method: 'POST',
    headers: supabaseHeaders(token),
    body: JSON.stringify(body),
  });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return await res.json();
}

/* =============================================================
 * зҠ¶жҖҒеҸҳйҮ? * ============================================================= */
var currentUser = null;
var currentBook = null;
var bookId = null;
var currentToken = null;

/* =============================================================
 * е·Ҙе…·еҮҪж•°
 * ============================================================= */
function showToast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + (type || 'info');
  void t.offsetWidth;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(function() { t.classList.remove('show'); }, 3000);
}

function escHtml(s) {
  if (!s) return '';
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function formatDate(iso) {
  if (!iso) return '';
  var d = new Date(iso);
  return d.getFullYear() + '-' +
    String(d.getMonth() + 1).padStart(2, '0') + '-' +
    String(d.getDate()).padStart(2, '0') + ' ' +
    String(d.getHours()).padStart(2, '0') + ':' +
    String(d.getMinutes()).padStart(2, '0');
}

/* =============================================================
 * йЎөйқўеҲқе§ӢеҢ–пјҡи§Јжһҗ URL еҸӮж•°
 * ============================================================= */
(function() {
  var params = new URLSearchParams(window.location.search);
  bookId = params.get('id');
  if (!bookId) {
    document.getElementById('bookDetail').innerHTML =
      '<div class="text-center py-20"><p class="text-3xl mb-2">вҡ пёҸ</p><p class="text-gray-400 mb-4">зјәе°‘д№ҰзұҚ ID</p><a href="index.html" class="text-brand-600 text-sm font-medium hover:text-brand-700 transition-colors">вҶ?иҝ”еӣһйҰ–йЎө</a></div>';
  }
})();

/* =============================================================
 * еҠ иҪҪд№ҰзұҚиҜҰжғ…
 * ============================================================= */
async function loadBook() {
  if (!bookId) return;

  try {
    // иҜ»еҸ– sessionпјҲдёҚејәеҲ¶зҷ»еҪ•пј?    var session = getStoredSession();
    if (session) {
      // йӘҢиҜҒ session е№¶иҺ·еҸ–з”ЁжҲ·дҝЎжҒ?      try {
        var userData = await apiGet('/auth/v1/user', session.access_token);
        if (userData && userData.id) {
          currentUser = userData;
          currentToken = session.access_token;
        }
      } catch(e) {}
    }

    // REST API жҹҘиҜўд№ҰзұҚиҜҰжғ…
    var books = await apiGet('/rest/v1/books?id=eq.' + bookId + '&select=*');

    if (!books || books.length === 0) {
      showNotFound();
      return;
    }

    currentBook = books[0];
    renderBook(currentBook);

  } catch (err) {
    console.error('еҠ иҪҪеӨұиҙҘ:', err);
    if (err.message && err.message.indexOf('PGRST116') >= 0) {
      showNotFound();
    } else {
      document.getElementById('bookDetail').innerHTML =
        '<div class="text-center py-20"><p class="text-3xl mb-2">вҡ пёҸ</p><p class="text-gray-400 mb-4">еҠ иҪҪеӨұиҙҘпјҢиҜ·жЈҖжҹҘзҪ‘з»ңиҝһжҺ?/p><a href="index.html" class="text-brand-600 text-sm font-medium hover:text-brand-700 transition-colors">вҶ?иҝ”еӣһйҰ–йЎө</a></div>';
    }
  }
}

/* =============================================================
 * жҳҫзӨә"д№ҰзұҚдёҚеӯҳең?
 * ============================================================= */
function showNotFound() {
  document.getElementById('bookDetail').innerHTML =
    '<div class="text-center py-20"><p class="text-3xl mb-2">рҹ“ӯ</p><p class="text-gray-400 text-base mb-1">д№ҰзұҚдёҚеӯҳең?/p><p class="text-gray-300 text-xs mb-4">еҸҜиғҪе·Іиў«еҲ йҷӨжҲ–й“ҫжҺҘй”ҷиҜ?/p><a href="index.html" class="inline-block px-5 py-2 rounded-xl text-sm font-semibold text-white bg-gradient-to-r from-blue-600 to-indigo-600 hover:shadow-lg transition-all no-underline">вҶ?иҝ”еӣһд№Ұж‘ҠзңӢзңӢ</a></div>';
}

/* =============================================================
 * жёІжҹ“д№ҰзұҚиҜҰжғ…
 * ============================================================= */
function renderBook(book) {
  var isSold = book.status !== 'еңЁе”®';
  var isOwner = currentUser && currentUser.id === book.user_id;
  var timeStr = formatDate(book.created_at);

  var condStyles = {
    'е…Ёж–°':   'bg-green-50 text-green-700 border border-green-200',
    'д№қжҲҗж–?: 'bg-blue-50 text-blue-700 border border-blue-200',
    'е…«жҲҗж–?: 'bg-amber-50 text-amber-700 border border-amber-200',
    'жңүз¬”и®?: 'bg-orange-50 text-orange-700 border border-orange-200',
    'жңүз ҙжҚ?: 'bg-red-50 text-red-700 border border-red-200',
  };
  var condStyle = condStyles[book.condition] || 'bg-gray-50 text-gray-600 border border-gray-200';

  var coverHtml = book.cover_url
    ? '<img src="' + escHtml(book.cover_url) + '" alt="е°Ғйқў" class="w-full h-full object-cover" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'"><div class="hidden items-center justify-center h-full text-5xl text-brand-500">рҹ“ҡ</div>'
    : '<div class="flex items-center justify-center h-full text-5xl text-brand-500">рҹ“ҡ</div>';

  /* жҢүй’®йҖ»иҫ‘ */
  var btnHtml = '';
  if (isSold) {
    btnHtml = '<div class="px-6 py-3 bg-gray-100 rounded-xl text-center text-sm font-semibold text-gray-400 cursor-not-allowed">' +
      (book.status === 'е·Іе”®' ? 'рҹ”ҙ е·Іе”®еҮ? : 'рҹ“Ң е·ІдёӢжһ?) + '</div>';
  } else if (!currentUser) {
    btnHtml = '<a href="auth.html?redirect=book.html%3Fid%3D' + book.id + '" class="block text-center px-6 py-3 rounded-xl text-sm font-semibold text-white bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 shadow-sm hover:shadow-md transition-all no-underline">рҹ”‘ зҷ»еҪ•еҗҺз”іиҜ·иҙӯд№?/a>';
  } else if (isOwner) {
    btnHtml = '<div class="px-6 py-3 bg-brand-50 rounded-xl text-center text-sm font-semibold text-brand-600">рҹ“– иҝҷжҳҜжҲ‘зҡ„д№?/div>';
  } else {
    btnHtml = '<button onclick="openOrderModal()" class="w-full px-6 py-3 rounded-xl text-sm font-semibold text-white bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 shadow-sm hover:shadow-md transition-all cursor-pointer">рҹ’¬ жҲ‘жғіиҰҒиҝҷжң¬д№Ұ</button>';
  }

  document.getElementById('bookDetail').innerHTML =
    '<div class="bg-white rounded-2xl shadow-[0_1px_4px_rgba(0,0,0,.04),0_1px_3px_rgba(0,0,0,.06)] border border-gray-200 overflow-hidden">' +
      '<div class="flex flex-col md:flex-row">' +
        /* е·Ұдҫ§е°Ғйқў */
        '<div class="md:w-80 md:min-h-[320px] h-72 bg-gradient-to-br from-brand-50 to-indigo-50 relative overflow-hidden">' +
          coverHtml +
          (isSold ? '<div class="absolute top-3 left-3 bg-red-500/90 text-white text-xs font-semibold px-2.5 py-1 rounded-md backdrop-blur-sm">' +
            (book.status === 'е·Іе”®' ? 'е·Іе”®' : 'е·ІдёӢжһ?) + '</div>' : '') +
        '</div>' +
        /* еҸідҫ§дҝЎжҒҜ */
        '<div class="flex-1 p-6 sm:p-8">' +
          '<h1 class="text-xl font-bold leading-snug text-gray-900">' + escHtml(book.title) + '</h1>' +
          '<p class="text-sm text-gray-500 mt-1">' + escHtml(book.author) + '</p>' +
          '<div class="flex items-baseline gap-3 mt-4">' +
            '<span class="text-3xl font-extrabold text-red-500">пҝ? + parseFloat(book.price).toFixed(2).replace(/\.?0+$/, '') + '</span>' +
            (book.original_price ? '<span class="text-sm text-gray-300 line-through">пҝ? + parseFloat(book.original_price).toFixed(2).replace(/\.?0+$/, '') + '</span>' : '') +
          '</div>' +
          '<div class="flex flex-wrap gap-2 mt-3">' +
            '<span class="px-2.5 py-1 rounded-lg text-xs font-semibold ' + condStyle + '">' + book.condition + '</span>' +
            (book.location ? '<span class="px-2.5 py-1 rounded-lg text-xs font-semibold bg-gray-100 text-gray-600 border border-gray-200">рҹ“Қ ' + book.location + '</span>' : '') +
            (book.publisher ? '<span class="px-2.5 py-1 rounded-lg text-xs font-semibold bg-gray-100 text-gray-600 border border-gray-200">рҹҸў ' + escHtml(book.publisher) + '</span>' : '') +
          '</div>' +
          '<div class="grid grid-cols-2 gap-3 mt-5 bg-gray-50 rounded-xl p-4">' +
            '<div><div class="text-[10px] text-gray-400 uppercase tracking-wide">е”®д»·</div><div class="text-sm font-bold text-red-500 mt-0.5">пҝ? + book.price + '</div></div>' +
            '<div><div class="text-[10px] text-gray-400 uppercase tracking-wide">е“Ғзӣё</div><div class="text-sm font-bold mt-0.5">' + book.condition + '</div></div>' +
            (book.location ? '<div><div class="text-[10px] text-gray-400 uppercase tracking-wide">дәӨжҳ“ең°зӮ№</div><div class="text-sm font-bold mt-0.5">' + book.location + '</div></div>' : '') +
            '<div><div class="text-[10px] text-gray-400 uppercase tracking-wide">еҸ‘еёғж—¶й—ҙ</div><div class="text-sm font-bold mt-0.5">' + timeStr + '</div></div>' +
          '</div>' +
          (book.isbn ? '<p class="text-xs text-gray-400 mt-3 flex items-center gap-1">рҹ“– ISBNпј? + escHtml(book.isbn) + '</p>' : '') +
          (book.description ? '<div class="mt-4 pt-4 border-t border-gray-100"><div class="text-xs font-semibold text-gray-500 mb-1.5">рҹ“қ жҸҸиҝ°</div><p class="text-sm text-gray-700 leading-relaxed whitespace-pre-wrap">' + escHtml(book.description) + '</p></div>' : '') +
          (book.contact ? '<div class="mt-4 pt-4 border-t border-gray-100"><div class="text-xs font-semibold text-gray-500 mb-1.5">рҹ“һ еҚ–е®¶иҒ”зі»ж–№ејҸ</div><p class="text-sm font-bold text-brand-600">' + escHtml(book.contact) + '</p></div>' : '') +
          '<div class="mt-6">' + btnHtml + '</div>' +
        '</div>' +
      '</div>' +
    '</div>';
}

/* =============================================================
 * дёӢеҚ•еј№зӘ—
 * ============================================================= */
function openOrderModal() {
  if (!currentBook) return;
  document.getElementById('orderBookTitle').textContent = 'гҖ? + currentBook.title + 'гҖ?;
  document.getElementById('orderMessage').value = '';
  var btn = document.getElementById('orderBtn');
  btn.disabled = false;
  btn.innerHTML = 'зЎ®и®ӨеҸ‘йҖ?;
  document.getElementById('orderModal').classList.add('open');
}

function closeOrderModal() {
  document.getElementById('orderModal').classList.remove('open');
}

/* =============================================================
 * жҸҗдәӨи®ўеҚ•пјҲREST APIпј? * ============================================================= */
async function submitOrder() {
  if (!currentUser || !currentBook || !currentToken) return;

  var btn = document.getElementById('orderBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> еҸ‘йҖҒдёӯ...';

  var message = document.getElementById('orderMessage').value.trim();

  try {
    await apiPost('/rest/v1/orders', {
      book_id: currentBook.id,
      buyer_id: currentUser.id,
      seller_id: currentBook.user_id,
      status: 'еҫ…зЎ®и®?,
      message: message || null,
      created_at: new Date().toISOString(),
    }, currentToken);

    closeOrderModal();
    showToast('вң?е·ІеҸ‘йҖҒиҙӯд№°иҜ·жұӮпјҢзӯүеҫ…еҚ–е®¶зЎ®и®Ө', 'success');
  } catch (err) {
    console.error('дёӢеҚ•еӨұиҙҘ:', err);
    showToast('вқ?еҸ‘йҖҒеӨұиҙҘпјҡ' + (err.message || 'жңӘзҹҘй”ҷиҜҜ'), 'error');
    btn.disabled = false;
    btn.innerHTML = 'зЎ®и®ӨеҸ‘йҖ?;
  }
}

/* =============================================================
 * еј№зӘ—е…ій—ӯдәӢд»¶
 * ============================================================= */
document.getElementById('orderModal').addEventListener('click', function(e) {
  if (e.target === this) closeOrderModal();
});
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeOrderModal();
});

/* =============================================================
 * еҗҜеҠЁ
 * ============================================================= */
loadBook();
</script>
