<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>泰皋阁 · 校园二手书</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: { sans: ['Inter', 'Noto Sans SC', 'system-ui', 'sans-serif'] },
      colors: { brand: { 50: '#eef2ff', 100: '#e0e7ff', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca' } }
    }
  }
}
</script>

<style>
body { -webkit-font-smoothing: antialiased; }
.book-card { transition: all .35s cubic-bezier(.4,0,.2,1); }
.book-card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(0,0,0,.08), 0 2px 8px rgba(0,0,0,.04); }
.book-card .cover-img { transition: transform .5s cubic-bezier(.4,0,.2,1); }
.book-card:hover .cover-img { transform: scale(1.05); }
.toast {
  position: fixed; bottom: 28px; left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: #1e293b; color: #fff;
  padding: 10px 24px; border-radius: 10px;
  font-size: 14px; opacity: 0;
  transition: all .35s cubic-bezier(.4,0,.2,1);
  z-index: 200; pointer-events: none;
  box-shadow: 0 4px 16px rgba(0,0,0,.18);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* 骨架屏闪烁 */
@keyframes shimmer { 0%{opacity:.6} 50%{opacity:1} 100%{opacity:.6} }
.skeleton { animation: shimmer 1.5s ease-in-out infinite; }
</style>
</head>
<body class="bg-[#f5f7fa] font-sans text-gray-900 min-h-screen">

<script>
const SUPABASE_URL = 'https://zqhzigukoikdwcbhzkysk.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbG…khdQ';

let supabase = null;
try {
  if (typeof createClient === 'function') {
    supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  }
} catch(e) { supabase = null; }

let currentUser = null;
let allBooks = [];
let activeCat = '全部';
let filterCat = '';
let searchQuery = '';

const CATS = ['全部','理工','文科','外语','计算机','医学','考试','小说','其他'];

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(function(){t.classList.remove('show')}, 2500);
}

// ====== Supabase 查询函数 ======
async function fetchBooks() {
  if (!supabase) return [];

  var query = supabase
    .from('books')
    .select('*')
    .eq('status', '在售')
    .order('created_at', { ascending: false });

  var { data, error } = await query;
  if (error) { console.error('Supabase 查询失败:', error); return []; }
  return data || [];
}

// ====== 搜索=按书名或作者 ======
function filterBooks(books, query, cat) {
  var result = books;
  if (query) {
    var q = query.toLowerCase();
    result = result.filter(function(b) {
      return (b.title && b.title.toLowerCase().includes(q)) ||
             (b.author && b.author.toLowerCase().includes(q));
    });
  }
  if (cat && cat !== '全部') {
    result = result.filter(function(b) { return b.category === cat; });
  }
  return result;
}
</script>

<!-- ====== 导航栏 ====== -->
<header class="sticky top-0 z-50 bg-white/80 backdrop-blur-lg border-b border-gray-100">
<div class="max-w-6xl mx-auto px-4 sm:px-6 h-14 flex items-center justify-between">
  <a href="index.html" class="flex items-center gap-1.5 no-underline">
    <span class="text-xl">🏛️</span>
    <span class="text-lg font-bold bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent">泰皋阁</span>
    <span class="text-[10px] font-semibold bg-gradient-to-r from-blue-600 to-indigo-600 text-white px-1.5 py-0.5 rounded">校园</span>
  </a>
  <div id="navRight" class="flex items-center gap-2 text-sm"></div>
</div>
</header>

<!-- ====== Hero & 搜索 ====== -->
<section class="pt-12 pb-8 px-4 text-center">
<div class="max-w-xl mx-auto">
  <h1 class="text-3xl sm:text-4xl font-bold tracking-tight text-gray-900">二手教材，便宜又靠谱</h1>
  <p class="mt-2 text-gray-400 text-sm">和同校同学直接交易，当面看货，省下一半书费</p>
  <div class="mt-5 flex gap-2 max-w-md mx-auto">
    <input type="text" id="searchInput" placeholder="搜书名、作者..." oninput="handleSearch()"
           class="flex-1 px-4 py-2.5 bg-white border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all">
    <button onclick="handleSearch()" class="px-4 py-2.5 rounded-xl text-sm font-medium text-white bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 transition-all shadow-sm">搜索</button>
  </div>
  <div class="mt-4 flex justify-center gap-6 text-xs text-gray-400">
    <span>📚 <strong class="text-gray-700 font-semibold" id="totalBooks">0</strong> 本书</span>
    <span>💰 均价 <strong class="text-gray-700 font-semibold" id="avgPrice">¥0</strong></span>
    <span>🏫 同校交易</span>
  </div>
  <div class="mt-4 flex gap-1.5 justify-center flex-wrap" id="filters"></div>
</div>
</section>

<!-- ====== 书籍列表 ====== -->
<main class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 pb-12">
  <div class="grid gap-4 grid-cols-2 sm:grid-cols-3 lg:grid-cols-4" id="bookGrid"></div>
</main>

<div class="toast" id="toast"></div>

<script>
// ====== 渲染导航栏 ======
function renderNav(user) {
  var el = document.getElementById('navRight');
  if (user) {
    el.innerHTML =
      '<span class="text-xs text-gray-400 hidden sm:inline">' + escHtml(user.email) + '</span>' +
      '<a href="sell.html" class="px-3 py-1.5 rounded-lg text-xs font-medium text-white bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 transition-all">发布</a>' +
      '<button onclick="handleLogout()" class="px-2 py-1.5 rounded-lg text-xs text-gray-400 hover:text-gray-600 hover:bg-gray-100 transition-all">退出</button>';
  } else {
    el.innerHTML =
      '<a href="auth.html" class="px-3 py-1.5 rounded-lg text-xs font-medium text-gray-500 hover:text-gray-900 hover:bg-gray-100 transition-all">登录</a>' +
      '<a href="auth.html" class="px-3 py-1.5 rounded-lg text-xs font-medium text-white bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 transition-all">注册</a>';
  }
}

function handleLogout() {
  if (supabase) {
    supabase.auth.signOut();
  }
  currentUser = null;
  renderNav(null);
  showToast('👋 已退出');
}

// ====== 渲染分类筛选 ======
function renderFilters(activeCat) {
  var el = document.getElementById('filters');
  el.innerHTML = CATS.map(function(c) {
    return '<span class="px-3 py-1 rounded-full text-xs border transition-all cursor-pointer ' +
      (c === activeCat ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-gray-500 border-gray-200 hover:border-blue-500 hover:text-blue-600') +
      '" onclick="setCat(\'' + c + '\')">' + c + '</span>';
  }).join('');
}

// ====== 渲染书籍卡片 ======
function renderBooks(books) {
  var grid = document.getElementById('bookGrid');
  var count = document.getElementById('totalBooks');
  var avg = document.getElementById('avgPrice');

  count.textContent = books.length;
  if (books.length > 0) {
    var total = books.reduce(function(s, b) { return s + parseFloat(b.price || 0); }, 0);
    avg.textContent = '¥' + (total / books.length).toFixed(1);
  } else {
    avg.textContent = '¥0';
  }

  if (books.length === 0) {
    grid.innerHTML =
      '<div class="col-span-full text-center py-20 text-gray-400">' +
        '<div class="text-5xl mb-3">📭</div>' +
        '<p class="text-sm">暂无在售书籍</p>' +
        '<p class="text-xs text-gray-300 mt-1">去发布一本吧！</p>' +
        '<a href="sell.html" class="inline-block mt-4 px-5 py-2.5 rounded-xl text-sm font-medium text-white bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 transition-all">📤 发布书籍</a>' +
      '</div>';
    return;
  }

  grid.innerHTML = books.map(function(b) {
    var condColor = {
      '全新': 'bg-green-50 text-green-700',
      '九成新': 'bg-blue-50 text-blue-700',
      '八成新': 'bg-amber-50 text-amber-700',
      '有笔记': 'bg-orange-50 text-orange-700',
      '有破损': 'bg-red-50 text-red-700',
    }[b.condition] || 'bg-gray-50 text-gray-600';

    var coverHtml = b.cover_url
      ? '<img src="' + escHtml(b.cover_url) + '" alt="封面" class="w-full h-full object-cover cover-img">'
      : '<div class="flex items-center justify-center h-full text-3xl text-blue-500">📚</div>';

    return '<a href="book.html?id=' + b.id + '" class="book-card block bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">' +
      '<div class="aspect-[3/4] overflow-hidden bg-gradient-to-br from-blue-50 to-indigo-50">' + coverHtml + '</div>' +
      '<div class="p-3">' +
        '<div class="text-sm font-semibold leading-tight truncate">' + escHtml(b.title) + '</div>' +
        '<div class="text-xs text-gray-400 mt-0.5 truncate">' + escHtml(b.author) + '</div>' +
        '<div class="flex items-center justify-between mt-2">' +
          '<span class="text-base font-bold text-red-500">¥' + b.price + '</span>' +
          '<span class="text-[10px] font-medium px-2 py-0.5 rounded-full ' + condColor + '">' + b.condition + '</span>' +
        '</div>' +
      '</div>' +
    '</a>';
  }).join('');
}

// ====== 骨架屏 ======
function showSkeleton() {
  var grid = document.getElementById('bookGrid');
  grid.innerHTML = '';
  for (var i = 0; i < 8; i++) {
    grid.innerHTML +=
      '<div class="bg-white rounded-2xl border border-gray-100 overflow-hidden">' +
        '<div class="aspect-[3/4] bg-gray-100 skeleton"></div>' +
        '<div class="p-3 space-y-2">' +
          '<div class="h-4 bg-gray-100 rounded skeleton w-3/4"></div>' +
          '<div class="h-3 bg-gray-100 rounded skeleton w-1/2"></div>' +
          '<div class="flex justify-between"><div class="h-4 bg-gray-100 rounded skeleton w-16"></div><div class="h-4 bg-gray-100 rounded skeleton w-12"></div></div>' +
        '</div>' +
      '</div>';
  }
}

// ====== 搜索 & 筛选 ======
function handleSearch() {
  searchQuery = document.getElementById('searchInput').value;
  var filtered = filterBooks(allBooks, searchQuery, activeCat);
  renderBooks(filtered);
}

function setCat(c) {
  activeCat = c;
  renderFilters(c);
  var filtered = filterBooks(allBooks, searchQuery, c);
  renderBooks(filtered);
}

function escHtml(s) {
  if (!s) return '';
  var d = document.createElement('div'); d.textContent = s; return d.innerHTML;
}

// ====== 初始化 ======
(async function() {
  // 检查登录状态
  if (supabase) {
    try {
      var { data } = await supabase.auth.getSession();
      if (data && data.session) {
        currentUser = data.session.user;
      }
    } catch(e) {}
  }
  renderNav(currentUser);

  // 加载书籍数据
  showSkeleton();
  allBooks = await fetchBooks();

  renderFilters('全部');
  renderBooks(allBooks);
})();
</script>

</body>
</html>
