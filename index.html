<style>

.book-card .body{padding:12px 14px 14px}

.c0{background:#d1fae5;color:#065f46}.c1{background:#dbeafe;color:#1e40af}.c2{background:#fef3c7;color:#92400e}.c3{background:#fce4ec;color:#b91c1c}

.form-modal{max-width:500px}.form-body{padding:16px 24px 24px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:13px;font-weight:600;margin-bottom:4px;color:var(--t)}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 14px;border:1px solid var(--b);border-radius:10px;font-size:14px;outline:0;font-family:inherit;transition:border .2s;background:#fafbfc}

.form-img-upload .upload-box:hover{border-color:var(--p);color:var(--p);background:var(--pl)}
.form-img-upload .upload-box .icon{font-size:22px}
.form-img-upload .upload-box input{position:absolute;inset:0;opacity:0;cursor:pointer}
.form-img-upload .img-preview{width:80px;height:80px;border-radius:10px;overflow:hidden;position:relative;border:1px solid var(--b)}
.form-img-upload .img-preview img{width:100%;height:100%;object-fit:cover}
.form-img-upload .img-preview .del{position:absolute;top:-4px;right:-4px;width:18px;height:18px;border-radius:50%;border:0;background:var(--d);color:#fff;font-size:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.btn{padding:10px 22px;border:0;border-radius:9px;font-size:14px;font-weight:600;cursor:pointer;transition:.2s;display:inline-flex;align-items:center;justify-content:center;gap:4px}
.btn-p{background:var(--p);color:#fff}.btn-p:hover{background:var(--pd);transform:translateY(-1px);box-shadow:0 2px 8px rgba(99,102,241,.3)}
.btn-block{width:100%;padding:13px}.btn-lg{padding:14px}
.btn-s{background:var(--s);color:#fff}.btn-s:hover{background:#059669;transform:translateY(-1px)}
.btn-d{background:#f1f5f9;color:var(--t2);border:1px solid var(--b)}.btn-d:hover{background:#e2e8f0}
.detail-modal{max-width:680px;max-height:92vh;display:flex;flex-direction:column}
.detail-modal .detail-scroll{overflow-y:auto;flex:1;min-height:0}
.detail-top{position:relative;width:100%;max-height:320px;background:linear-gradient(135deg,#eef2ff,#e0e7ff)}

.detail-body{padding:0 24px}
.detail-price{padding:14px 0 12px;border-bottom:1px solid var(--b)}

.detail-isbn{font-size:12px;color:var(--t3);padding:2px 0 10px}
.detail-seller{padding:12px 0;border-top:1px solid var(--b);display:flex;align-items:center;justify-content:space-between}

.contact-modal{max-width:360px}
.contact-body{padding:16px 22px 22px}

.contact-qb{background:#f8f9fb;border:1px solid var(--b);border-radius:10px;padding:12px;text-align:center}

.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(100px);background:#1e293b;color:#fff;padding:10px 22px;border-radius:10px;font-size:14px;opacity:0;transition:.35s cubic-bezier(.4,0,.2,1);z-index:200;pointer-events:none;box-shadow:0 4px 12px rgba(0,0,0,.15)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
footer{text-align:center;padding:20px;color:var(--t3);font-size:13px;border-top:1px solid var(--b)}
@media(max-width:640px){
.hero{padding:32px 14px 22px}.hero h1{font-size:23px}

nav{gap:2px}nav button{font-size:12px;padding:5px 9px}

.contact-qb{padding:10px}.contact-qb .qw canvas,.contact-qb .qw img{max-width:120px;max-height:120px}
}
</style>

// Sort
function setSort(m){sortMode=m;document.querySelectorAll('#sortBar span').forEach(e=>e.className='');document.getElementById('sort'+(m[0].toUpperCase()+m.slice(1))).className='active';render()}

// Render
function render(){
const grid=document.getElementById('bookGrid');
const filtersEl=document.getElementById('filters');
const q=(document.getElementById('searchInput').value||'').toLowerCase().trim();

if(sortMode==='cheap')books.sort((a,b)=>a.price-b.price);
else if(sortMode==='expensive')books.sort((a,b)=>b.price-a.price);
else books.sort((a,b)=>b.time-a.time);
const all=getBooks();
const avg=all.length>0?(all.reduce((s,b)=>s+b.price,0)/all.length).toFixed(1):'0';
document.getElementById('totalBooks').textContent=all.length;
document.getElementById('avgPrice').textContent='楼'+avg;
if(books.length===0){
grid.innerHTML='<div class="empty-state"><div class="icon">馃摥</div><p>'+(q?'娌℃湁鎵惧埌鍖归厤鐨勪功':'杩樻病鏈変汉鍙戝竷涔︾睄')+'</p><p class="sub">'+(!q&&activeCat==='鍏ㄩ儴'?'鐐瑰彸涓婅銆屽崠涔︺€嶆潵褰撶涓€涓崠瀹?馃帀':'')+'</p></div>';
return;
}

// ISBN lookup with fast timeout
function lookupIsbn(){
const isbn=document.getElementById('bookIsbn').value.trim();
if(!isbn||isbn.length<10){showToast('璇疯緭鍏ユ湁鏁堢殑ISBN');return;}
const s=document.getElementById('isbnStatus');
s.textContent='鈴?鏌ヨ涓?..';

const ac=new AbortController();
const timer=setTimeout(()=>ac.abort(),4000);

fetch('https://douban.uieee.xyz/v2/book/isbn/'+isbn,{signal:ac.signal}).then(r=>r.json()).then(d=>{
clearTimeout(timer);
if(d&&d.title){
document.getElementById('bookTitle').value=d.title||'';
if(d.author&&d.author[0])document.getElementById('bookAuthor').value=d.author[0].name||'';
s.textContent='鉁?'+esc(d.title);
showToast('鉁?ISBN 鏌ヨ鎴愬姛');
updatePriceRef();
}else{
s.textContent='鉂?鏈壘鍒拌涔?;showToast('鏈壘鍒拌涔︿俊鎭?);
}
}).catch(()=>{
clearTimeout(timer);
s.textContent='鉂?鏌ヨ瓒呮椂锛岃鎵嬪姩濉啓';
showToast('鏌ヨ澶辫触锛屾鏌ョ綉缁?);
})
}

// ISBN Scanner
let html5QrCode=null
function startScan(){
  document.getElementById('scanModal').classList.add('open')
  if(typeof Html5Qrcode==='undefined'){showToast('鎵弿搴撴湭鍔犺浇锛岃鎵嬪姩杈撳叆');return}
  html5QrCode=new Html5Qrcode('scanViewport')
  const config={fps:10,qrbox:{width:280,height:80}}
  html5QrCode.start({facingMode:'environment'},config,onScanSuccess,onScanError).catch(e=>{showToast('鏃犳硶鎵撳紑鎽勫儚澶?)})
}
function onScanSuccess(txt){
  const m=txt.match(/\d{10,13}/);if(!m)return
  const isbn=m[0]
  document.getElementById('bookIsbn').value=isbn
  stopScan()
  showToast('鉁?鎵爜鎴愬姛锛?+isbn)
  setTimeout(()=>lookupIsbn(),500)
}
function onScanError(e){}
function stopScan(){
  document.getElementById('scanModal').classList.remove('open')
  if(html5QrCode){try{html5QrCode.stop().catch(()=>{})}catch(e){}html5QrCode=null}
}

// Price reference
function updatePriceRef(){
const t=document.getElementById('bookTitle').value.trim().toLowerCase();
if(!t){document.getElementById('priceRef').textContent='';return;}
const all=getBooks().filter(b=>b.title.toLowerCase().includes(t)&&b.status!=='sold');
if(all.length<2){document.getElementById('priceRef').textContent='';return;}
const avg=(all.reduce((s,b)=>s+b.price,0)/all.length).toFixed(1);
document.getElementById('priceRef').textContent='馃挕 鍚屾涔﹀潎浠?楼'+avg+' ('+all.length+'鏈湪鍞?';
}
document.getElementById('bookTitle').addEventListener('input',updatePriceRef);

// Photo upload
function previewBookPhoto(e){
const f=e.target.files[0];if(!f)return;
const r=new FileReader();
r.onload=function(ev){bookPhotos.push(ev.target.result);renderPhotoPreviews()};
r.readAsDataURL(f);e.target.value='';
}
function removePhoto(i){bookPhotos.splice(i,1);renderPhotoPreviews()}
function renderPhotoPreviews(){
document.getElementById('photoPreviews').innerHTML=bookPhotos.map((p,i)=>'<div class="img-preview"><img src="'+p+'"><button class="del" onclick="removePhoto('+i+')">&times;</button></div>').join('');
}
function previewQr(e){
const f=e.target.files[0];if(!f)return;const r=new FileReader();
r.onload=function(ev){document.getElementById('qrPreviewImg').src=ev.target.result;document.getElementById('qrPreview').style.display='block'};
r.readAsDataURL(f);
}
function clearQrUpload(){document.getElementById('bookQrUpload').value='';document.getElementById('qrPreview').style.display='none'}

// Submit book
function openAddBook(){document.getElementById('addModal').classList.add('open')}
function closeModal(id){document.getElementById(id).classList.remove('open');if(id==='detailModal')document.getElementById('detailBottom').innerHTML='';if(id==='scanModal')stopScan()}
function submitBook(e){
e.preventDefault();
const title=document.getElementById('bookTitle').value.trim();
const author=document.getElementById('bookAuthor').value.trim();
const price=parseFloat(document.getElementById('bookPrice').value);
const condition=document.getElementById('bookCondition').value;
const contact=document.getElementById('bookContact').value.trim();
const category=document.getElementById('bookCategory').value;
const desc=document.getElementById('bookDesc').value.trim();
const isbn=document.getElementById('bookIsbn').value.trim();
const qrInp=document.getElementById('bookQrUpload');
const qrData=qrInp&&qrInp.files&&qrInp.files[0]?document.getElementById('qrPreviewImg').src:'';
if(!title||!author||!price||!contact){showToast('鈿狅笍 璇峰～鍐欏繀濉」');return;}
const book={id:Date.now(),title,author,isbn,price,condition,desc,contact,category,emoji:EMO[category]||'馃摎',time:Date.now(),photos:[...bookPhotos],qrData,seller:getNick(),status:'active'};
const books=getBooks();
books.unshift(book);
saveBooks(books);
closeModal('addModal');
e.target.reset();bookPhotos=[];document.getElementById('photoPreviews').innerHTML='';
showPage('market');render();
showToast('鉁?鍙戝竷鎴愬姛锛?);
}

// Detail
function showDetail(id){
const b=getBooks().find(x=>x.id===id);if(!b)return;
const cc=CC[b.condition]||'c1';
carouselIdx=0;
const hasPhotos=b.photos&&b.photos.length>0;
const renderCarousel=()=>{
const imgs=hasPhotos?b.photos:[];
const dotHtml=imgs.length>1?imgs.map((_,i)=>'<span'+(i===carouselIdx?' class="active"':'')+'></span>').join(''):'';
const prevBtn=imgs.length>1?'<button class="nav-btn nav-prev" onclick="event.stopPropagation();carouselPrev()">鈥?/button>':'';
const nextBtn=imgs.length>1?'<button class="nav-btn nav-next" onclick="event.stopPropagation();carouselNext()">鈥?/button>':'';
const imgHtml=imgs.length>0?'<img src="'+esc(imgs[carouselIdx])+'">':'<div class="no-img">'+(b.emoji||'馃摎')+'</div>';
return prevBtn+imgHtml+nextBtn+(dotHtml?'<div class="dots">'+dotHtml+'</div>':'');
};
const descHtml=b.desc?'<div class="detail-sec"><div class="sec-title">馃摑 鍟嗗搧鎻忚堪</div><div class="sec-body">'+esc(b.desc)+'</div></div>':'';
const isbnHtml=b.isbn?'<div class="detail-isbn">馃敄 ISBN锛?+esc(b.isbn)+'</div>':'';
const isFav=favs.includes(b.id);
const shareHtml='<div class="detail-share"><button onclick="shareBook('+b.id+')">馃摛 鍒嗕韩</button></div>';
const isSold=b.status==='sold';
document.getElementById('detailContent').innerHTML=
'<div class="detail-top"><div class="carousel" id="carousel">'+renderCarousel()+'</div></div>'+
'<div class="detail-body">'+
'<div class="detail-price"><span class="price">楼'+b.price+'</span>'+(isSold?' <span style="font-size:13px;color:var(--d);font-weight:600">宸插敭鍑?/span>':'')+
'<div class="tags"><span class="'+cc+'" style="padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500">'+b.condition+'</span><span style="background:var(--pl);color:var(--p)">'+b.category+'</span>'+(isSold?' <span style="background:#fce4ec;color:var(--d)">宸插敭</span>':'')+'</div></div>'+
'<div class="detail-title"><h2>'+esc(b.title)+'</h2><div class="author">'+esc(b.author)+'</div></div>'+
'<div class="detail-info"><div class="item"><div class="lb">馃挵 浠锋牸</div><div class="vl" style="color:var(--d)">楼'+b.price+'</div></div><div class="item"><div class="lb">馃搳 涔﹀喌</div><div class="vl"><span class="'+cc+'" style="padding:1px 6px;border-radius:4px;font-size:12px">'+b.condition+'</span></div></div><div class="item"><div class="lb">馃彿锔?鍒嗙被</div><div class="vl">'+b.category+'</div></div><div class="item"><div class="lb">鈴?鍙戝竷</div><div class="vl">'+timeAgo(b.time)+'</div></div></div>'+
isbnHtml+descHtml+
'<div class="detail-seller"><div class="left"><div class="avatar">馃懁</div><div><div class="sname">'+esc(b.seller||'鏍″洯鍗栧')+'</div><div class="stime">'+timeAgo(b.time)+'鍙戝竷</div></div></div>'+shareHtml+'</div>'+'</div>'
'</div>'
;
document.getElementById('detailBottom').innerHTML=
(!isSold?'<button class="btn btn-s btn-lg" onclick="contactSeller(\''+esc(b.contact)+'\',\''+(b.qrData||'')+'\')">馃摫 鑱旂郴鍗栧</button>':'<button class="btn btn-s btn-lg" disabled style="opacity:.5">馃摫 宸插敭鍑?/button>')+
'<button class="btn btn-d btn-lg" onclick="toggleSold('+b.id+')">'+(isSold?'馃攧 閲嶆柊涓婃灦':'鉁?鏍囪宸插敭')+'</button>';
document.getElementById('detailModal').classList.add('open');
}

function carouselNext(){const b=getBooks().find(x=>x.id===parseInt(document.querySelector('[id^=detail]')?.id?.replace('detail','')||0));if(!b||!b.photos)return;carouselIdx=(carouselIdx+1)%b.photos.length;renderCarousel()}
function carouselPrev(){const b=getBooks().find(x=>x.id===parseInt(document.querySelector('[id^=detail]')?.id?.replace('detail','')||0));if(!b||!b.photos)return;carouselIdx=(carouselIdx-1+b.photos.length)%b.photos.length;renderCarousel()}
function renderCarousel(){
const el=document.getElementById('carousel');if(!el)return;
const bEl=document.getElementById('detailContent');
const bid=parseInt([...document.querySelectorAll('[id^=detail]')].find(e=>e.id!=='detailContent'&&e.id!=='detailBottom'&&e.id!=='detailScroll')?.id?.replace('detailContent','')||0);
const b=getBooks().find(x=>x.id===bid);if(!b||!b.photos||b.photos.length<2)return;
const imgs=b.photos;
const dotHtml=imgs.map((_,i)=>'<span'+(i===carouselIdx?' class="active"':'')+'></span>').join('');
el.innerHTML='<button class="nav-btn nav-prev" onclick="event.stopPropagation();carouselPrev()">鈥?/button><img src="'+esc(imgs[carouselIdx])+'"><button class="nav-btn nav-next" onclick="event.stopPropagation();carouselNext()">鈥?/button><div class="dots">'+dotHtml+'</div>';
}

// Toggle sold status
function toggleSold(id){
if(!confirm('纭畾鏍囪涓哄凡鍞紵鍙殢鏃堕噸鏂颁笂鏋?))return;
const books=getBooks();
const b=books.find(x=>x.id===id);
if(!b)return;
if(b.status==='sold'){b.status='active';showToast('馃攧 宸查噸鏂颁笂鏋?)}else{b.status='sold';showToast('鉁?宸叉爣璁板凡鍞?)}
saveBooks(books);
const inDetail=document.getElementById('detailModal').classList.contains('open');
if(inDetail)showDetail(id);else render();
if(currentPage==='favorites')renderFavs();
}

// Share
function shareBook(id){
const b=getBooks().find(x=>x.id===id);if(!b)return;
const url=window.location.href;
const text='馃摎 '+b.title+' - 楼'+b.price+'锛?+b.condition+'锛?;
if(navigator.share){
navigator.share({title:b.title,text:text,url:url}).catch(()=>{});
}else if(navigator.clipboard&&navigator.clipboard.writeText){
navigator.clipboard.writeText(text+' '+url).then(()=>showToast('鉁?宸插鍒讹紝鍘诲井淇＄矘璐村垎浜?)).catch(()=>showToast('澶嶅埗澶辫触'));
}else{showToast('馃搵 '+text+' '+url)}
}

// Nickname & Data
function getNick(){return localStorage.getItem('nick')||'鏍″洯鍗栧'}
function setNick(){
const v=document.getElementById('nickInput').value.trim();
if(!v){showToast('璇疯緭鍏ユ樀绉?);return}
localStorage.setItem('nick',v);
document.getElementById('nickDisplay').textContent=v;
showToast('鉁?鏄电О宸蹭繚瀛?);
}
function exportData(){
const data={books:getBooks(),favs:favs,time:Date.now()};
const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='book-market-data.json';a.click();
URL.revokeObjectURL(a.href);
showToast('鉁?鏁版嵁宸插鍑?);
}
function importData(e){
const file=e.target.files[0];if(!file)return;
const reader=new FileReader();
reader.onload=function(ev){try{
const d=JSON.parse(ev.target.result);
if(d.books){saveBooks(d.books);if(d.favs){favs=d.favs;saveFavs()}render();showToast('鉁?瀵煎叆鎴愬姛锛屽叡'+d.books.length+'鏈功');}
else showToast('鈿狅笍 鏃犳晥鐨勬暟鎹枃浠?);
}catch(e){showToast('鈿狅笍 瀵煎叆澶辫触锛屾枃浠舵牸寮忛敊璇?)}};
reader.readAsText(file);
e.target.value='';
}

// Contact
function contactSeller(contact,qrData){
closeModal('detailModal');
document.getElementById('contactInfoDisplay').textContent=contact;
const btn=document.getElementById('copyContactBtn');btn.textContent='澶嶅埗';btn.className='cpy';
const container=document.getElementById('qrcodeContainer');container.innerHTML='';
if(qrData){
document.getElementById('qrLabel').textContent='馃摳 鍗栧涓婁紶鐨勪簩缁寸爜';
container.innerHTML='<img src="'+qrData+'" alt="浜岀淮鐮? style="max-width:140px;max-height:140px;border-radius:4px">';
}else{
document.getElementById('qrLabel').textContent='馃摳 鎵簩缁寸爜鍔犲ソ鍙?;
try{if(typeof QRCode!=='undefined'){new QRCode(container,{text:contact,width:140,height:140,colorDark:'#1e293b',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.H})}else{container.innerHTML='<div style="width:140px;height:140px;background:#f1f5f9;border-radius:6px;display:flex;align-items:center;justify-content:center">馃摫</div>'}}catch(e){container.innerHTML='<div style="width:140px;height:140px;background:#f1f5f9;border-radius:6px;display:flex;align-items:center;justify-content:center">馃摫</div>'}
}
document.getElementById('contactModal').classList.add('open');
}
function copyContact(){
const t=document.getElementById('contactInfoDisplay').textContent;if(!t)return;
const b=document.getElementById('copyContactBtn');
const d=function(t,b2){
if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(t).then(()=>{b2.textContent='宸插鍒?鉁?;b2.className='cpy ok';setTimeout(()=>{b2.textContent='澶嶅埗';b2.className='cpy'},1800)}).catch(()=>{fc(t,b2)})}else{fc(t,b2)}
};
d(t,b);
}
function fc(t,b){
const ta=document.createElement('textarea');ta.value=t;ta.style.position='fixed';ta.style.opacity='0';
document.body.appendChild(ta);ta.select();
try{document.execCommand('copy');b.textContent='宸插鍒?鉁?;b.className='cpy ok';setTimeout(()=>{b.textContent='澶嶅埗';b.className='cpy'},1800)}catch(e){showToast('澶嶅埗澶辫触')}
document.body.removeChild(ta);
}

function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function timeAgo(ts){const d=Date.now()-ts;if(d<6e4)return'鍒氬垰';if(d<36e5)return Math.floor(d/6e4)+'鍒嗛挓鍓?;if(d<864e5)return Math.floor(d/36e5)+'灏忔椂鍓?;return Math.floor(d/864e5)+'澶╁墠'}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._timer);t._timer=setTimeout(()=>t.classList.remove('show'),2200)}

document.querySelectorAll('.modal-overlay').forEach(el=>{el.addEventListener('click',e=>{if(e.target===el)el.classList.remove('open')})});
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.querySelectorAll('.modal-overlay.open').forEach(el=>el.classList.remove('open'))});
render();
</script>
