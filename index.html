<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="校园二手书市 — 同校同学之间买卖二手教材，省钱又环保">
<title>校园二手书市</title>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<style>
  :root {
    --primary: #4f46e5;
    --primary-light: #eef2ff;
    --primary-dark: #3730a3;
    --accent: #f59e0b;
    --bg: #f8fafc;
    --card: #ffffff;
    --text: #1e293b;
    --text-secondary: #64748b;
    --text-muted: #94a3b8;
    --border: #e2e8f0;
    --success: #10b981;
    --danger: #ef4444;
    --radius: 12px;
    --radius-sm: 8px;
    --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
    --shadow-lg: 0 10px 25px rgba(0,0,0,.1);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
  }
  .container { max-width: 1100px; margin: 0 auto; padding: 0 16px; }

  /* Header */
  header {
    background: rgba(255,255,255,.85);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 50;
    backdrop-filter: blur(12px);
  }
  header .container { display: flex; align-items: center; justify-content: space-between; height: 60px; }
  .logo { font-size: 20px; font-weight: 700; color: var(--primary); text-decoration: none; display: flex; align-items: center; gap: 6px; cursor: pointer; }
  .logo .badge { background: var(--primary); color: white; font-size: 11px; padding: 2px 7px; border-radius: 4px; font-weight: 500; }
  nav { display: flex; gap: 6px; }
  nav button {
    background: none; border: 1px solid var(--border); padding: 7px 14px; border-radius: var(--radius-sm);
    font-size: 13px; cursor: pointer; color: var(--text); transition: all .2s;
  }
  nav button:hover { border-color: var(--primary); color: var(--primary); }
  nav .sell-btn { background: var(--primary); color: white; border-color: var(--primary); font-weight: 500; }
  nav .sell-btn:hover { background: var(--primary-dark); }

  /* Hero */
  .hero {
    text-align: center;
    padding: 48px 16px 32px;
    background: linear-gradient(135deg, var(--primary-light) 0%, #f0f9ff 50%, #fff 100%);
  }
  .hero h1 { font-size: 28px; margin-bottom: 6px; letter-spacing: -0.5px; }
  .hero h1 .highlight { color: var(--primary); }
  .hero p { color: var(--text-secondary); font-size: 15px; max-width: 440px; margin: 0 auto 20px; }

  .search-bar {
    display: flex; gap: 8px; max-width: 480px; margin: 0 auto;
  }
  .search-bar input {
    flex: 1; padding: 10px 16px; border: 1px solid var(--border); border-radius: var(--radius-sm);
    font-size: 14px; outline: none; transition: border .2s;
  }
  .search-bar input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79,70,229,.1); }
  .search-bar button {
    padding: 10px 18px; border: none; border-radius: var(--radius-sm); font-size: 14px;
    cursor: pointer; background: var(--primary); color: white; font-weight: 500;
  }
  .search-bar button:hover { background: var(--primary-dark); }

  /* Stats bar */
  .stats {
    display: flex; justify-content: center; gap: 32px; padding: 16px 0 8px; font-size: 13px; color: var(--text-muted);
  }
  .stats strong { color: var(--text); font-size: 16px; }

  /* Filters */
  .filters {
    display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; padding: 16px 0 0;
  }
  .filters .tag {
    padding: 5px 12px; border-radius: 20px; font-size: 13px; border: 1px solid var(--border);
    background: var(--card); cursor: pointer; transition: all .2s; user-select: none;
  }
  .filters .tag:hover { border-color: var(--primary); color: var(--primary); }
  .filters .tag.active { background: var(--primary); color: white; border-color: var(--primary); }

  /* Stats row */
  .result-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 0 4px; font-size: 13px; color: var(--text-muted);
  }
  .result-bar button {
    background: none; border: none; font-size: 13px; color: var(--primary); cursor: pointer;
  }
  .result-bar button:hover { text-decoration: underline; }

  /* Book grid */
  .book-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 14px; padding: 12px 0 40px;
  }
  .book-card {
    background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow);
    padding: 16px; cursor: pointer; transition: all .25s; border: 1px solid transparent;
    position: relative;
  }
  .book-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-3px); border-color: var(--primary-light); }
  .book-card .cover {
    width: 100%; height: 160px; background: linear-gradient(135deg, var(--primary-light), #e0e7ff);
    border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center;
    font-size: 40px; margin-bottom: 10px; color: var(--primary);
  }
  .book-card .title { font-size: 15px; font-weight: 600; margin-bottom: 3px; line-height: 1.4; }
  .book-card .author { font-size: 13px; color: var(--text-secondary); margin-bottom: 8px; }
  .book-card .meta { display: flex; justify-content: space-between; align-items: center; }
  .book-card .price { font-size: 18px; font-weight: 700; color: var(--danger); }
  .book-card .condition {
    font-size: 11px; padding: 2px 8px; border-radius: 4px; font-weight: 500;
  }
  .cond-new { background: #d1fae5; color: #065f46; }
  .cond-good { background: #dbeafe; color: #1e40af; }
  .cond-fair { background: #fef3c7; color: #92400e; }
  .cond-poor { background: #fce4ec; color: #b91c1c; }
  .book-card .time-tag {
    font-size: 11px; color: var(--text-muted); margin-top: 8px;
  }

  /* Modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(15,23,42,.5);
    z-index: 100; backdrop-filter: blur(2px); padding: 20px; overflow-y: auto;
  }
  .modal-overlay.open { display: flex; align-items: flex-start; justify-content: center; }
  .modal {
    background: var(--card); border-radius: var(--radius); max-width: 540px;
    width: 100%; margin: 40px auto; padding: 28px; box-shadow: var(--shadow-lg);
    animation: modalIn .2s ease;
  }
  @keyframes modalIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  .modal h2 { font-size: 19px; margin-bottom: 20px; }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .modal-header h2 { margin-bottom: 0; }
  .modal .close {
    background: none; border: none; width: 32px; height: 32px; font-size: 20px;
    cursor: pointer; color: var(--text-muted); border-radius: 50%; display: flex;
    align-items: center; justify-content: center; transition: all .2s;
  }
  .modal .close:hover { background: var(--border); color: var(--text); }

  /* Form */
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 4px; color: var(--text); }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm);
    font-size: 14px; outline: none; font-family: inherit; transition: border .2s;
    background: var(--bg);
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79,70,229,.1); background: white; }
  .form-group textarea { resize: vertical; min-height: 72px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .btn {
    padding: 10px 22px; border: none; border-radius: var(--radius-sm); font-size: 14px;
    font-weight: 500; cursor: pointer; transition: all .2s;
  }
  .btn-primary { background: var(--primary); color: white; }
  .btn-primary:hover { background: var(--primary-dark); }
  .btn-block { width: 100%; padding: 12px; }

  /* Detail */
  .detail-cover {
    width: 100%; height: 200px;
    background: linear-gradient(135deg, var(--primary-light), #e0e7ff);
    border-radius: var(--radius-sm); display: flex; align-items: center;
    justify-content: center; font-size: 60px; margin-bottom: 16px; color: var(--primary);
  }
  .detail-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .detail-meta .item { padding: 10px 12px; background: var(--bg); border-radius: var(--radius-sm); }
  .detail-meta .item .label { font-size: 11px; color: var(--text-muted); }
  .detail-meta .item .value { font-size: 15px; font-weight: 600; margin-top: 2px; }
  .detail-desc { font-size: 14px; color: var(--text-secondary); line-height: 1.7; margin-bottom: 16px; padding: 12px; background: var(--bg); border-radius: var(--radius-sm); }
  .detail-actions { display: flex; gap: 8px; }
  .detail-actions .btn { flex: 1; }
  .btn-contact { background: var(--success); color: white; }
  .btn-contact:hover { background: #059669; }
  .btn-delete { background: #f1f5f9; color: var(--text-secondary); border: 1px solid var(--border); }
  .btn-delete:hover { background: #fee2e2; color: var(--danger); border-color: var(--danger); }

  /* Empty state */
  .empty-state {
    text-align: center; padding: 60px 16px; color: var(--text-secondary); grid-column: 1 / -1;
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 8px; }
  .empty-state p { font-size: 14px; }
  .empty-state .sub { font-size: 13px; color: var(--text-muted); margin-top: 4px; }

  /* Toast */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: #1e293b; color: white; padding: 12px 24px; border-radius: var(--radius-sm);
    font-size: 14px; opacity: 0; transition: all .3s; z-index: 200;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* About */
  .about-section { max-width: 600px; margin: 0 auto; text-align: center; }
  .about-section p { color: var(--text-secondary); font-size: 14px; line-height: 1.8; }
  .about-section .features { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 20px 0; text-align: left; }
  .about-section .features .item { background: var(--bg); padding: 14px; border-radius: var(--radius-sm); }
  .about-section .features .item .icon { font-size: 24px; margin-bottom: 4px; }
  .about-section .features .item .name { font-weight: 600; font-size: 14px; }
  .about-section .features .item .desc { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

  /* Footer */
  footer {
    text-align: center; padding: 20px; color: var(--text-muted);
    font-size: 13px; border-top: 1px solid var(--border);
  }

  /* Contact modal */
  .contact-modal { max-width: 380px; }
  .qrcode-wrap {
    display: inline-block;
    background: white;
    padding: 16px;
    border-radius: var(--radius-sm);
    box-shadow: var(--shadow);
    margin: 8px 0;
  }
  .qrcode-wrap canvas, .qrcode-wrap img { display: block !important; margin: 0 auto; }
  .contact-info {
    margin: 12px 0;
    padding: 14px;
    background: #f1f5f9;
    border-radius: var(--radius-sm);
    font-size: 18px;
    font-weight: 600;
    word-break: break-all;
    color: var(--text);
    letter-spacing: .5px;
  }
  .contact-label {
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 400;
    margin-bottom: 6px;
  }

  @media (max-width: 600px) {
    .hero h1 { font-size: 22px; }
    .book-grid { grid-template-columns: 1fr; }
    .form-row { grid-template-columns: 1fr; }
    .detail-meta { grid-template-columns: 1fr; }
    .about-section .features { grid-template-columns: 1fr; }
    .modal { padding: 20px; margin: 20px auto; }
    .stats { gap: 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="container">
    <div class="logo" onclick="showPage('market')">📚 书市<span class="badge">校园</span></div>
    <nav>
      <button onclick="showPage('market')">📖 书摊</button>
      <button onclick="showPage('about')">ℹ️ 关于</button>
      <button class="sell-btn" onclick="openAddBook()">➕ 卖书</button>
    </nav>
  </div>
</header>

<section class="hero" id="heroSection">
  <div class="container">
    <h1><span class="highlight">二手教材</span>，便宜又靠谱</h1>
    <p>和同校同学直接交易，当面看货，省下一半书费</p>
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="搜书名、作者..." oninput="render()">
      <button onclick="render()">🔍 搜索</button>
    </div>
    <div class="stats" id="statsBar">
      <span>📚 <strong id="totalBooks">0</strong> 本书</span>
      <span>💰 均价 <strong id="avgPrice">¥0</strong></span>
      <span>🏫 同校交易</span>
    </div>
    <div class="filters" id="filters"></div>
  </div>
</section>

<main class="container">
  <div class="result-bar" id="resultBar">
    <span id="resultCount"></span>
    <button onclick="resetAll()">↺ 重置</button>
  </div>
  <div class="book-grid" id="bookGrid"></div>
</main>

<div id="aboutPage" style="display:none">
  <main class="container" style="padding:40px 16px">
    <div class="about-section">
      <h2>📚 校园二手书市</h2>
      <p>帮同校同学买卖二手教材的平台。<br>省钱、环保，让每一本书都能被下一个需要的人用上。</p>
      <div class="features">
        <div class="item"><div class="icon">💰</div><div class="name">便宜</div><div class="desc">二手价格通常是原价的 2-5 折</div></div>
        <div class="item"><div class="icon">🤝</div><div class="name">当面交易</div><div class="desc">校内面交，看到实物再付款</div></div>
        <div class="item"><div class="icon">📱</div><div class="name">直接联系</div><div class="desc">看到联系方式直接跟卖家聊</div></div>
        <div class="item"><div class="icon">🌱</div><div class="name">环保</div><div class="desc">让教材循环使用，减少浪费</div></div>
      </div>
      <p style="font-size:13px;color:var(--text-muted);margin-top:24px">
        📢 由你和你同学一起维护 · 书况真实 · 价格透明
      </p>
    </div>
  </main>
</div>

<!-- Add Modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-header">
      <h2>📤 发布二手书</h2>
      <button class="close" onclick="closeModal('addModal')">&times;</button>
    </div>
    <form onsubmit="submitBook(event)">
      <div class="form-group">
        <label>书名 *</label>
        <input type="text" id="bookTitle" required placeholder="例如：高等数学（第七版）上册">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>作者 *</label>
          <input type="text" id="bookAuthor" required placeholder="作者全名">
        </div>
        <div class="form-group">
          <label>ISBN（选填）</label>
          <input type="text" id="bookIsbn" placeholder="978-7-xxx-xxxxx-x">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>价格（元）*</label>
          <input type="number" id="bookPrice" required min="0" step="0.5" placeholder="比如 25">
        </div>
        <div class="form-group">
          <label>书况 *</label>
          <select id="bookCondition">
            <option value="全新">全新 — 未使用过</option>
            <option value="近新" selected>近新 — 几乎没笔记</option>
            <option value="良好">良好 — 少量划线</option>
            <option value="一般">一般 — 有笔记/磨损</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>描述（选填）</label>
        <textarea id="bookDesc" placeholder="写清楚版本、使用情况、有没有赠品（习题集、光盘等）"></textarea>
      </div>
      <div class="form-group">
        <label>联系方式 *</label>
        <input type="text" id="bookContact" required placeholder="微信 / QQ / 手机号">
      </div>
      <div class="form-group">
        <label>分类 *</label>
        <select id="bookCategory">
          <option value="理工">📐 理工类</option>
          <option value="文科">📖 文科类</option>
          <option value="外语">🌍 外语类</option>
          <option value="计算机">💻 计算机类</option>
          <option value="医学">🏥 医学类</option>
          <option value="考试">📝 考试/考证</option>
          <option value="小说">🎭 小说/文学</option>
          <option value="其他">📦 其他</option>
        </select>
      </div>
      <button type="submit" class="btn btn-primary btn-block" style="margin-top:4px">📤 发布</button>
    </form>
  </div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="detailModal">
  <div class="modal">
    <div class="modal-header">
      <h2>📖 书籍详情</h2>
      <button class="close" onclick="closeModal('detailModal')">&times;</button>
    </div>
    <div id="detailContent"></div>
  </div>
</div>

<!-- Contact Modal -->
<div class="modal-overlay" id="contactModal">
  <div class="modal contact-modal">
    <div class="modal-header">
      <h2>📱 联系卖家</h2>
      <button class="close" onclick="closeModal('contactModal')">&times;</button>
    </div>
    <div id="contactContent" style="text-align:center">
      <div class="qrcode-wrap" id="qrcodeContainer"></div>
      <div id="contactInfoDisplay" class="contact-info"></div>
      <button class="btn btn-contact" id="copyContactBtn" onclick="copyContact()" style="margin-top:12px">📋 复制联系方式</button>
      <p style="margin-top:16px;font-size:13px;color:var(--text-muted)">💡 截图二维码或复制信息，到微信/QQ添加好友</p>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<footer>
  <div class="container">📚 校园二手书市 · 当面验货 · 注意安全</div>
</footer>

<script>
const STORAGE_KEY = 'campus…rket';
const CATEGORIES = ['全部','理工','文科','外语','计算机','医学','考试','小说','其他'];
const EMOJI = { '理工':'📐','文科':'📖','外语':'🌍','计算机':'💻','医学':'🏥','考试':'📝','小说':'🎭','其他':'📦' };
const COND_CLASS = { '全新':'cond-new','近新':'cond-good','良好':'cond-fair','一般':'cond-poor' };

// ====== Data ======
function getBooks() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { return []; } }
function saveBooks(b) { localStorage.setItem(STORAGE_KEY, JSON.stringify(b)); }

// Seed

    {id:2, title:'大学英语精读（第三版）', author:'董亚芬', isbn:'978-7-532-72024-3', price:15, condition:'良好', category:'外语', desc:'有荧光笔标注重点，不影响阅读。送四级词汇小册子。', contact:'QQ: 23456789', time:Date.now()-864e5*4, emoji:'🌍'},
    {id:3, title:'C程序设计（第五版）', author:'谭浩强', isbn:'978-7-302-42137-5', price:18, condition:'一般', category:'计算机', desc:'上课记了很多笔记，对新手很有参考价值。送习题答案电子版。', contact:'微信: c_programmer', time:Date.now()-864e5, emoji:'💻'},
    {id:4, title:'马克思主义基本原理概论', author:'本书编写组', isbn:'978-7-040-51539-8', price:8, condition:'全新', category:'文科', desc:'全新未拆封，买了两本。', contact:'微信: marx2024', time:Date.now()-864e5*3, emoji:'📖'},
    {id:5, title:'人体解剖学彩色图谱（第3版）', author:'张朝佑', isbn:'978-7-535-74638-5', price:35, condition:'近新', category:'医学', desc:'几乎没有翻过，送配套习题册。', contact:'QQ: 87654321', time:Date.now()-864e5*6, emoji:'🏥'},

// ====== Pages ======
let currentPage = 'market';

function showPage(page) {
  currentPage = page;
  const market = document.getElementById('bookGrid').closest('main');
  const about = document.getElementById('aboutPage');
  const hero = document.getElementById('heroSection');
  if (page === 'market') {
    market.style.display = 'block';
    about.style.display = 'none';
    hero.style.display = 'block';
  } else {
    market.style.display = 'none';
    about.style.display = 'block';
    hero.style.display = 'none';
  }
}

// ====== Render ======
function render() {
  const grid = document.getElementById('bookGrid');
  const filtersEl = document.getElementById('filters');
  const query = (document.getElementById('searchInput').value || '').toLowerCase().trim();
  const activeCat = filtersEl.dataset.active || '全部';

  // Filters
  filtersEl.innerHTML = CATEGORIES.map(c =>
    `<span class="tag ${c === activeCat ? 'active' : ''}" onclick="setFilter('${c}')">${c}</span>`
  ).join('');

  let books = getBooks();
  if (activeCat !== '全部') books = books.filter(b => b.category === activeCat);
  if (query) books = books.filter(b => b.title.toLowerCase().includes(query) || b.author.toLowerCase().includes(query));
  books.sort((a, b) => b.time - a.time);

  // Stats
  const all = getBooks();
  const avg = all.length > 0 ? (all.reduce((s, b) => s + b.price, 0) / all.length).toFixed(1) : '0';
  document.getElementById('totalBooks').textContent = all.length;
  document.getElementById('avgPrice').textContent = '¥' + avg;
  document.getElementById('resultCount').textContent = books.length > 0 ? `找到 ${books.length} 本书` : '';

  // Grid
  if (books.length === 0) {
    grid.innerHTML = `<div class="empty-state">
      <div class="icon">📭</div>
      <p>${query ? '没有找到匹配的书，换个关键词试试？' : '还没有人发布书籍'}</p>
      <p class="sub">${!query && activeCat === '全部' ? '点右上角「卖书」来当第一个卖家吧 🎉' : ''}</p>
    </div>`;
    return;
  }

  grid.innerHTML = books.map(b => {
    const cc = COND_CLASS[b.condition] || 'cond-good';
    const ago = timeAgo(b.time);
    return `<div class="book-card" onclick="showDetail(${b.id})">
      <div class="cover">${b.emoji || '📚'}</div>
      <div class="title">${esc(b.title)}</div>
      <div class="author">${esc(b.author)}</div>
      <div class="meta">
        <span class="price">¥${b.price}</span>
        <span class="condition ${cc}">${b.condition}</span>
      </div>
      <div class="time-tag">${ago}</div>
    </div>`;
  }).join('');
}

function setFilter(c) {
  document.getElementById('filters').dataset.active = c;
  render();
}

function resetAll() {
  document.getElementById('searchInput').value = '';
  document.getElementById('filters').dataset.active = '全部';
  render();
}

// ====== Add Book ======
function openAddBook() { document.getElementById('addModal').classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function submitBook(e) {
  e.preventDefault();
  const title = document.getElementById('bookTitle').value.trim();
  const author = document.getElementById('bookAuthor').value.trim();
  const price = parseFloat(document.getElementById('bookPrice').value);
  const condition = document.getElementById('bookCondition').value;
  const contact = document.getElementById('bookContact').value.trim();
  const category = document.getElementById('bookCategory').value;
  const desc = document.getElementById('bookDesc').value.trim();
  const isbn = document.getElementById('bookIsbn').value.trim();

  if (!title || !author || !price || !contact) { showToast('⚠️ 请填写必填项'); return; }

  const book = {
    id: Date.now(), title, author, isbn, price, condition, desc, contact, category,
    emoji: EMOJI[category] || '📚', time: Date.now()
  };
  const books = getBooks();
  books.unshift(book);
  saveBooks(books);
  closeModal('addModal');
  e.target.reset();
  showPage('market');
  render();
  showToast('✅ 发布成功！');
}

// ====== Detail ======
function showDetail(id) {
  const b = getBooks().find(x => x.id === id);
  if (!b) return;
  const cc = COND_CLASS[b.condition] || 'cond-good';
  document.getElementById('detailContent').innerHTML = `
    <div class="detail-cover">${b.emoji || '📚'}</div>
    <h2 style="margin-bottom:4px;font-size:18px">${esc(b.title)}</h2>
    <p style="color:var(--text-secondary);margin-bottom:16px;font-size:14px">${esc(b.author)}</p>
    <div class="detail-meta">
      <div class="item"><div class="label">💰 价格</div><div class="value" style="color:var(--danger);font-size:20px">¥${b.price}</div></div>
      <div class="item"><div class="label">📊 书况</div><div class="value"><span class="condition ${cc}" style="font-size:13px">${b.condition}</span></div></div>
      <div class="item"><div class="label">🏷️ 分类</div><div class="value">${b.category}</div></div>
      <div class="item"><div class="label">⏰ 发布时间</div><div class="value">${timeAgo(b.time)}</div></div>
    </div>
    ${b.isbn ? `<p style="font-size:13px;color:var(--text-muted);margin-bottom:12px">🔖 ISBN: ${esc(b.isbn)}</p>` : ''}
    ${b.desc ? `<div class="detail-desc">📝 ${esc(b.desc)}</div>` : ''}
    <div class="detail-actions">
      <button class="btn btn-contact" onclick="contactSeller('${esc(b.contact)}')">📱 联系卖家</button>
      <button class="btn btn-delete" onclick="deleteBook(${b.id})">🗑️ 下架</button>
    </div>
    <p style="text-align:center;font-size:12px;color:var(--text-muted);margin-top:16px">⚠️ 当面交易 · 注意安全 · 价格自行协商</p>
  `;
  document.getElementById('detailModal').classList.add('open');
}

function contactSeller(contact) {
  closeModal('detailModal');
  document.getElementById('contactInfoDisplay').innerHTML =
    '<div class="contact-label">卖家联系方式</div>' + esc(contact);

  // Generate QR code
  const container = document.getElementById('qrcodeContainer');
  container.innerHTML = '';
  try {
    new QRCode(container, {
      text: contact,
      width: 200,
      height: 200,
      colorDark: '#1e293b',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.H
    });
  } catch(e) {
    container.innerHTML = '<div class="qrcode-fallback" style="width:200px;height:200px;background:#f1f5f9;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:64px;margin:0 auto">📱</div>';
  }

  document.getElementById('contactModal').classList.add('open');
}

function copyContact() {
  const text = document.getElementById('contactInfoDisplay').textContent;
  if (!text) return;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => {
      showToast('✅ 已复制到剪贴板');
    }).catch(() => {
      fallbackCopy(text);
    });
  } else {
    fallbackCopy(text);
  }
}

function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  try {
    document.execCommand('copy');
    showToast('✅ 已复制到剪贴板');
  } catch(e) {
    showToast('⚠️ 复制失败，请手动复制');
  }
  document.body.removeChild(ta);
}

function deleteBook(id) {
  if (!confirm('确定下架这本书吗？')) return;
  saveBooks(getBooks().filter(b => b.id !== id));
  closeModal('detailModal');
  render();
  showToast('🗑️ 已下架');
}

// ====== Util ======
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function timeAgo(ts) {
  const d = Date.now() - ts;
  if (d < 6e4) return '刚刚';
  if (d < 36e5) return Math.floor(d / 6e4) + '分钟前';
  if (d < 864e5) return Math.floor(d / 36e5) + '小时前';
  return Math.floor(d / 864e5) + '天前';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2500);
}

// ====== Init ======
document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); });
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.querySelectorAll('.modal-overlay.open').forEach(el => el.classList.remove('open'));
});
render();
</script>
