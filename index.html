<script>
/* Supabase REST API */
var SUPABASE_URL = 'https://zqhzigukoidwcbhzkysk.supabase.co';
var SUPABASE_ANON_KEY = 'sb_publishable_i03mX2MB2rd3b1TTrTZXbg_tvYL5iz7';

var allBooks = [];
var activeFilter = 'all';
var searchQ = '';

function sh(token) {
  return { 'apikey': SUPABASE_ANON_KEY, 'Authorization': '***' + (token || SUPABASE_ANON_KEY), 'Content-Type': 'application/json' };
}

var _t = null;
function showToast(m, type) {
  var t = document.getElementById('toast');
  t.textContent = m;
  t.className = 'toast ' + (type || 'info');
  void t.offsetWidth;
  t.classList.add('show');
  clearTimeout(_t);
  _t = setTimeout(function() { t.classList.remove('show'); }, 3000);
}

function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

/* 8s timeout fetch helper */
function fetchWithTimeout(url, opt, ms) {
  var c = new AbortController();
  var id = setTimeout(function() { c.abort(); }, ms || 8000);
  return fetch(url, Object.assign({}, opt, { signal: c.signal })).then(function(r) { clearTimeout(id); return r; });
}

/* Read session from localStorage */
function getSession() {
  for (var k in localStorage) {
    if (k.indexOf('sb-') === 0 && k.indexOf('-auth-token') > 0) {
      try { var d = JSON.parse(localStorage.getItem(k)); if (d && d.access_token) return d; } catch(e) {}
    }
  }
  return null;
}

/* Nav render */
function renderNav(user) {
  var el = document.getElementById('navRight');
  if (user) {
    el.innerHTML = '<span class="text-gray-500 text-xs sm:text-sm hidden sm:inline" title="' + esc(user.email) + '">\u{1F464} ' + esc(user.email) + '</span>' +
      '<a href="sell.html" class="text-indigo-600 hover:text-indigo-700 font-medium px-2 py-1 no-underline">\u53D1\u5E03</a>' +
      '<a href="#" onclick="event.preventDefault();showToast(\'\u{1F4CC} \u8BA2\u5355\u529F\u80FD\u5373\u5C06\u4E0A\u7EBF\',\'info\')" class="text-gray-500 hover:text-gray-700 px-2 py-1 no-underline hidden sm:inline">\u8BA2\u5355</a>' +
      '<button onclick="logout()" class="text-gray-400 hover:text-gray-600 px-2 py-1 bg-transparent border-0 cursor-pointer text-sm">\u9000\u51FA</button>';
  } else {
    el.innerHTML = '<a href="auth.html?redirect=index.html" class="text-gray-500 hover:text-gray-700 px-2 py-1 no-underline">\u767B\u5F55</a>' +
      '<span class="text-gray-300">|</span>' +
      '<a href="auth.html?redirect=index.html" class="text-white px-3 py-1.5 rounded-lg font-medium no-underline" style="background:linear-gradient(135deg,#2563eb,#4f46e5)">\u6CE8\u518C</a>';
  }
}

/* Logout */
async function logout() {
  var s = getSession();
  if (s && s.access_token) {
    try { await fetch(SUPABASE_URL + '/auth/v1/logout', { method: 'POST', headers: sh(s.access_token) }); } catch(e) {}
    for (var k in localStorage) { if (k.indexOf('sb-') === 0 && k.indexOf('-auth-token') > 0) localStorage.removeItem(k); }
  }
  renderNav(null);
  showToast('\u5DF2\u9000\u51FA\u767B\u5F55', 'info');
}

/* Load books */
async function loadBooks() {
  var grid = document.getElementById('bookGrid');

  // Skeleton
  grid.innerHTML = '';
  for (var i = 0; i < 8; i++) {
    grid.innerHTML += '<div class="bg-white rounded-2xl overflow-hidden border border-gray-100 shadow-sm"><div class="aspect-[3/4] skel"></div><div class="p-3 space-y-2"><div class="skel h-3.5 w-3/4"></div><div class="skel h-3 w-1/2"></div><div class="skel h-4 w-2/3"></div></div></div>';
  }

  var timeoutTimer = setTimeout(function() {
    if (grid) grid.innerHTML = '<div class="col-span-full text-center py-16"><p class="text-4xl mb-3">\u26A0\uFE0F</p><p class="text-gray-400 text-sm">\u52A0\u8F7D\u8D85\u65F6\uFF0C\u8BF7\u5237\u65B0\u91CD\u8BD5</p><button onclick="location.reload()" class="mt-3 px-5 py-2 rounded-lg text-sm font-semibold text-white border-0 cursor-pointer" style="background:linear-gradient(135deg,#2563eb,#4f46e5)">\u5237\u65B0</button></div>';
  }, 8000);

  try {
    var session = getSession();
    var user = null;
    if (session) {
      try {
        var r = await fetchWithTimeout(SUPABASE_URL + '/auth/v1/user', { headers: sh(session.access_token) }, 5000);
        if (r.ok) user = await r.json();
      } catch(e) {}
    }
    renderNav(user);

    var url = SUPABASE_URL + '/rest/v1/books?select=*&status=eq.\u5728\u552E&order=created_at.desc';
    var r2 = await fetchWithTimeout(url, { headers: sh() });
    if (r2.ok) allBooks = await r2.json() || [];
  } catch(e) {
    allBooks = [];
  }

  clearTimeout(timeoutTimer);
  applyFilter();
}

function condCls(c) {
  var m = { '\u5168\u65B0': 'bg-green-50 text-green-700 border border-green-200', '\u4E5D\u6210\u65B0': 'bg-blue-50 text-blue-700 border border-blue-200', '\u516B\u6210\u65B0': 'bg-amber-50 text-amber-700 border border-amber-200', '\u6709\u7B14\u8BB0': 'bg-orange-50 text-orange-700 border border-orange-200', '\u6709\u7834\u635F': 'bg-red-50 text-red-700 border border-red-200' };
  return m[c] || 'bg-gray-50 text-gray-600 border border-gray-200';
}

function condName(c) {
  var m = { 'all': '\u5168\u90E8', 'new': '\u5168\u65B0', '90': '\u4E5D\u6210\u65B0', '80': '\u516B\u6210\u65B0', 'notes': '\u6709\u7B14\u8BB0', 'damaged': '\u6709\u7834\u635F' };
  return m[c] || c;
}

/* Apply filters & render */
function applyFilter() {
  var grid = document.getElementById('bookGrid');
  var filtered = allBooks;

  // Search
  var q = (document.getElementById('searchInput').value || '').toLowerCase();
  if (q) {
    filtered = filtered.filter(function(b) { return (b.title && b.title.toLowerCase().indexOf(q) >= 0) || (b.author && b.author.toLowerCase().indexOf(q) >= 0); });
  }

  // Condition filter
  var cond = condName(activeFilter);
  if (cond !== '\u5168\u90E8') {
    filtered = filtered.filter(function(b) { return b.condition === cond; });
  }

  // Stats
  document.getElementById('totalBooks').textContent = filtered.length;
  var avg = filtered.length > 0 ? (filtered.reduce(function(s, b) { return s + parseFloat(b.price || 0); }, 0) / filtered.length).toFixed(1) : '0';
  document.getElementById('avgPrice').textContent = '\uFFE5' + avg;

  // Empty state
  if (filtered.length === 0) {
    var empty = q || cond !== '\u5168\u90E8';
    grid.innerHTML = '<div class="col-span-full text-center py-16"><div class="text-4xl mb-3">' + (empty ? '\uD83D\uDD0D' : '\uD83D\uDCED') + '</div><p class="text-sm text-gray-400 mb-1">' + (empty ? '\u6CA1\u6709\u627E\u5230\u5339\u914D\u7684\u4E66\u7C4D' : '\u6682\u65E0\u5728\u552E\u4E66\u7C4D') + '</p>' + (empty ? '' : '<a href="sell.html" class="inline-block mt-3 px-6 py-2.5 rounded-xl text-sm font-semibold text-white no-underline" style="background:linear-gradient(135deg,#2563eb,#4f46e5)">\uD83D\uDCE4 \u53BB\u53D1\u5E03\u4E00\u672C\u5427</a>') + '</div>';
    return;
  }

  // Cards
  grid.innerHTML = filtered.map(function(b) {
    var cover = b.cover_url
      ? '<img src="' + esc(b.cover_url) + '" alt="" class="w-full h-full object-cover transition-transform duration-300 group-hover:scale-105" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'"><div class="hidden items-center justify-center h-full text-3xl" style="color:#6366f1">\uD83D\uDCDA</div>'
      : '<div class="flex items-center justify-center h-full text-3xl" style="color:#6366f1">\uD83D\uDCDA</div>';

    return '<a href="book.html?id=' + b.id + '" class="group bg-white rounded-2xl overflow-hidden border border-gray-100 shadow-sm hover:shadow-lg transition-all duration-300 hover:-translate-y-1 no-underline text-inherit">' +
      '<div class="aspect-[3/4] overflow-hidden relative" style="background:linear-gradient(135deg,#eef2ff,#e0e7ff)">' + cover + '</div>' +
      '<div class="p-3 sm:p-3.5">' +
        '<div class="text-sm font-semibold text-gray-900 leading-snug truncate mb-0.5">' + esc(b.title) + '</div>' +
        '<div class="text-xs text-gray-400 truncate mb-2">' + esc(b.author) + '</div>' +
        '<div class="flex items-center justify-between">' +
          '<span class="text-base sm:text-lg font-bold" style="color:#ef4444">\uFFE5' + b.price + '</span>' +
          '<span class="px-2 py-0.5 rounded-md text-[10px] font-semibold border ' + condCls(b.condition) + '">' + b.condition + '</span>' +
        '</div>' +
      '</div>' +
    '</a>';
  }).join('');
}

function doSearch() { applyFilter(); }
function setFilter(f) { activeFilter = f; var t = document.querySelectorAll('.filter-tag'); for (var i = 0; i < t.length; i++) { t[i].className = t[i].className.replace(' active', ''); if (t[i].getAttribute('data-filter') === f) t[i].className += ' active'; } applyFilter(); }

loadBooks();
</script>
