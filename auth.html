<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>登录 · 泰皋阁</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans SC","PingFang SC","Microsoft YaHei",sans-serif;background:#f5f7fa;color:#0f172a;min-height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}
.header{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.88);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid #e2e8f0}
.header-inner{max-width:1080px;margin:0 auto;padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between}
.logo{font-size:19px;font-weight:700;display:flex;align-items:center;gap:6px;cursor:pointer;text-decoration:none;letter-spacing:-.3px}
.logo-text{background:linear-gradient(135deg,#2563eb,#4f46e5);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.logo-badge{background:linear-gradient(135deg,#2563eb,#4f46e5);color:#fff;font-size:10px;padding:2px 7px;border-radius:5px;font-weight:600;-webkit-text-fill-color:#fff}
.back-link{font-size:13px;color:#94a3b8;text-decoration:none;transition:color .2s}
.back-link:hover{color:#64748b}
.main{flex:1;display:flex;align-items:center;justify-content:center;padding:48px 16px}
.wrap{width:100%;max-width:340px;text-align:center}
.brand-icon{font-size:36px;margin-bottom:8px}
.brand-title{font-size:20px;font-weight:700;background:linear-gradient(135deg,#2563eb,#4f46e5);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.brand-sub{font-size:12px;color:#94a3b8;margin-top:4px}
.tabs{display:flex;justify-content:center;gap:32px;margin-top:24px;margin-bottom:20px}
.tab-btn{font-size:14px;font-weight:600;cursor:pointer;border:0;background:0 0;padding:4px 0;position:relative;transition:color .2s;color:#94a3b8}
.tab-btn.active{color:#4f46e5}
.tab-btn.active::after{content:'';position:absolute;bottom:-2px;left:50%;transform:translateX(-50%);width:24px;height:2.5px;border-radius:2px;background:#4f46e5}
.tab-btn:hover{color:#64748b}
.card{background:#fff;border-radius:16px;box-shadow:0 1px 4px rgba(0,0,0,.04),0 1px 3px rgba(0,0,0,.06);border:1px solid #e2e8f0;padding:24px}
.card-form{display:none}
.card-form.active{display:block}
.form-group{margin-bottom:16px;text-align:left}
.form-group label{display:block;font-size:12px;font-weight:500;color:#64748b;margin-bottom:4px}
.form-group input{width:100%;padding:10px 14px;border:1px solid #e2e8f0;border-radius:10px;font-size:14px;outline:0;transition:all .2s;background:#f8fafc;font-family:inherit}
.form-group input:focus{border-color:#4f46e5;box-shadow:0 0 0 3px rgba(79,70,229,.1);background:#fff}
.form-group input::placeholder{color:#cbd5e1}
.form-row{display:flex;justify-content:space-between;align-items:center;font-size:12px;margin-bottom:16px}
.form-row label{display:flex;align-items:center;gap:6px;cursor:pointer;color:#94a3b8;transition:color .2s}
.form-row label:hover{color:#64748b}
.form-row input[type=checkbox]{width:14px;height:14px;border-radius:4px;border:1px solid #cbd5e1;accent-color:#4f46e5;cursor:pointer}
.form-row .forgot{background:0 0;border:0;color:#4f46e5;cursor:pointer;font-size:12px;transition:color .2s}
.form-row .forgot:hover{color:#4338ca}
.btn{width:100%;padding:11px 0;border:0;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;background:linear-gradient(135deg,#2563eb,#4f46e5);color:#fff;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;font-family:inherit}
.btn:hover{box-shadow:0 2px 8px rgba(79,70,229,.25)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn:disabled:hover{box-shadow:none}
.bottom-hint{font-size:12px;color:#94a3b8;margin-top:20px}
.bottom-hint a{color:#4f46e5;text-decoration:none;font-weight:500;cursor:pointer;transition:color .2s}
.bottom-hint a:hover{color:#4338ca}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(100px);background:#1e293b;color:#fff;padding:10px 24px;border-radius:10px;font-size:14px;opacity:0;transition:all .35s cubic-bezier(.4,0,.2,1);z-index:200;pointer-events:none;box-shadow:0 4px 16px rgba(0,0,0,.18)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeUp .35s ease both}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:inline-block;vertical-align:middle}
.policy{font-size:11px;color:#cbd5e1;margin-top:12px;text-align:center}
@media(max-width:480px){.wrap{max-width:100%}.card{border-radius:12px;padding:20px}.header-inner{padding:0 14px}}
</style>
</head>
<body>

<header class="header">
<div class="header-inner">
  <a href="index.html" class="logo"><span>🏛️</span><span class="logo-text">泰皋阁</span><span class="logo-badge">校园</span></a>
  <a href="index.html" class="back-link">← 返回书摊</a>
</div>
</header>

<main class="main">
<div class="wrap fade-in">

  <div class="brand-icon">🏛️</div>
  <div class="brand-title">泰皋阁</div>
  <p class="brand-sub">校园二手书平台</p>

  <!-- Tabs -->
  <div class="tabs">
    <button id="tabLogin" class="tab-btn active" onclick="switchTab('login')">登录</button>
    <button id="tabRegister" class="tab-btn" onclick="switchTab('register')">注册</button>
  </div>

  <!-- Card -->
  <div class="card">

    <!-- 登录 -->
    <form id="loginForm" class="card-form active" onsubmit="return false;">
      <div class="form-group">
        <label>邮箱</label>
        <input type="email" id="loginEmail" required placeholder="you@school.edu.cn" autocomplete="email">
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="loginPassword" required minlength="6" placeholder="******" autocomplete="current-password">
      </div>
      <div class="form-row">
        <label><input type="checkbox" id="rememberMe"> 记住我</label>
        <button type="button" class="forgot" id="forgotBtn">忘记密码？</button>
      </div>
      <button type="submit" id="loginBtn" class="btn">登录</button>
    </form>

    <!-- 注册 -->
    <form id="registerForm" class="card-form" onsubmit="return false;">
      <div class="form-group">
        <label>邮箱 *</label>
        <input type="email" id="regEmail" required placeholder="you@school.edu.cn" autocomplete="email">
      </div>
      <div class="form-group">
        <label>昵称 *</label>
        <input type="text" id="regNickname" required minlength="2" maxlength="20" placeholder="你的昵称" autocomplete="username">
      </div>
      <div class="form-group">
        <label>密码 *</label>
        <input type="password" id="regPassword" required minlength="6" placeholder="至少 6 位" autocomplete="new-password">
      </div>
      <div class="form-group">
        <label>手机号 <span style="color:#cbd5e1;font-weight:400">(选填)</span></label>
        <input type="tel" id="regPhone" placeholder="138xxxx8888" autocomplete="tel">
      </div>
      <button type="submit" id="registerBtn" class="btn">注册</button>
      <p class="policy">点击注册即表示同意《用户协议》和《隐私政策》</p>
    </form>

  </div>

  <p class="bottom-hint">
    <span id="switchHint">还没有账号？</span>
    <a id="switchLink" onclick="switchTab('register')">立即注册</a>
  </p>
</div>
</main>

<div class="toast" id="toast"></div>

<script>
/* Supabase REST API 配置 */
var SUPABASE_URL = 'https://zqhzigukoidwcbhzkysk.supabase.co';
var SUPABASE_ANON_KEY = 'sb_publishable_i03mX2MB2rd3b1TTrTZXbg_tvYL5iz7';

var currentTab = 'login';
var _toastTimer = null;

function supabaseHeaders(token) {
  return { 'apikey': SUPABASE_ANON_KEY, 'Authorization': 'Bearer ' + (token || SUPABASE_ANON_KEY), 'Content-Type': 'application/json' };
}

function switchTab(tab) {
  currentTab = tab;
  var isLogin = tab === 'login';
  document.getElementById('tabLogin').className = 'tab-btn' + (isLogin ? ' active' : '');
  document.getElementById('tabRegister').className = 'tab-btn' + (isLogin ? '' : ' active');
  document.getElementById('loginForm').className = 'card-form' + (isLogin ? ' active' : '');
  document.getElementById('registerForm').className = 'card-form' + (isLogin ? '' : ' active');
  document.getElementById('switchHint').textContent = isLogin ? '还没有账号？' : '已有账号？';
  document.getElementById('switchLink').textContent = isLogin ? '立即注册' : '去登录';
  document.getElementById('switchLink').onclick = function(e) { e.preventDefault(); switchTab(isLogin ? 'register' : 'login'); };
}

function showToast(msg, isError) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = isError ? '#991b1b' : '#1e293b';
  t.className = 'toast';
  t.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(function() { t.classList.remove('show'); }, 3000);
}

function setLoading(id, loading) {
  var btn = document.getElementById(id);
  btn.disabled = loading;
  btn.innerHTML = loading ? '<span class="spinner"></span> 处理中...' : (id === 'loginBtn' ? '登录' : '注册');
}

function getRedirectUrl() {
  var p = new URLSearchParams(window.location.search);
  return p.get('redirect') || 'index.html';
}

/* 保存 session 到 localStorage（与 Supabase SDK 格式兼容） */
function saveSessionToLocal(sessionData) {
  var key = 'sb-zqhzigukoidwcbhzkysk-supabase-co-auth-token';
  localStorage.setItem(key, JSON.stringify(sessionData));
}

function clearLocalSession() {
  for (var key in localStorage) {
    if (key.indexOf('sb-') === 0 && key.indexOf('-auth-token') > 0) {
      localStorage.removeItem(key);
    }
  }
}

/* ===== 登录 ===== */
async function handleLogin() {
  var email = document.getElementById('loginEmail').value.trim();
  var pw = document.getElementById('loginPassword').value;

  if (!email) { showToast('请输入邮箱', true); document.getElementById('loginEmail').focus(); return; }
  if (!pw || pw.length < 6) { showToast('请输入密码（至少6位）', true); document.getElementById('loginPassword').focus(); return; }

  setLoading('loginBtn', true);

  try {
    var res = await fetch(SUPABASE_URL + '/auth/v1/token?grant_type=password', {
      method: 'POST',
      headers: supabaseHeaders(),
      body: JSON.stringify({ email: email, password: pw }),
    });
    var data = await res.json();

    if (!res.ok) {
      var msg = data.error_description || data.msg || data.error || '登录失败';
      if (msg.indexOf('Invalid login credentials') >= 0) msg = '邮箱或密码错误';
      else if (msg.indexOf('Email not confirmed') >= 0) msg = '邮箱尚未验证';
      throw new Error(msg);
    }

    saveSessionToLocal(data);
    showToast('✅ 登录成功！');
    setTimeout(function() { window.location.href = getRedirectUrl(); }, 800);
  } catch (err) {
    showToast('❌ ' + err.message, true);
    setLoading('loginBtn', false);
  }
}

/* ===== 注册 ===== */
async function handleRegister() {
  var email = document.getElementById('regEmail').value.trim();
  var nick = document.getElementById('regNickname').value.trim();
  var pw = document.getElementById('regPassword').value;
  var phone = document.getElementById('regPhone').value.trim();

  if (!email) { showToast('请输入邮箱', true); document.getElementById('regEmail').focus(); return; }
  if (!nick || nick.length < 2) { showToast('昵称至少2个字符', true); document.getElementById('regNickname').focus(); return; }
  if (!pw || pw.length < 6) { showToast('密码至少6位', true); document.getElementById('regPassword').focus(); return; }

  setLoading('registerBtn', true);

  try {
    var res = await fetch(SUPABASE_URL + '/auth/v1/signup', {
      method: 'POST',
      headers: supabaseHeaders(),
      body: JSON.stringify({ email: email, password: pw, data: { nickname: nick, phone: phone || null } }),
    });
    var data = await res.json();

    if (!res.ok) {
      var msg = data.msg || data.error_description || data.error || '注册失败';
      if (msg.indexOf('already') >= 0) msg = '该邮箱已注册';
      throw new Error(msg);
    }

    // signup 返回的 data 直接包含 access_token（邮箱自动确认时）
    if (data.access_token && data.user) {
      saveSessionToLocal(data);
      showToast('✅ 注册成功！');
      setTimeout(function() { window.location.href = getRedirectUrl(); }, 800);
    } else {
      showToast('✅ 注册成功！请查收验证邮件后登录');
      setLoading('registerBtn', false);
      switchTab('login');
      document.getElementById('loginEmail').value = email;
    }
  } catch (err) {
    showToast('❌ ' + err.message, true);
    setLoading('registerBtn', false);
  }
}

/* ===== 忘记密码 ===== */
document.getElementById('forgotBtn').addEventListener('click', async function() {
  var email = document.getElementById('loginEmail').value.trim();
  if (!email) { showToast('请先在邮箱输入框中填写你的邮箱', true); document.getElementById('loginEmail').focus(); return; }

  this.disabled = true;
  this.textContent = '发送中...';

  try {
    var res = await fetch(SUPABASE_URL + '/auth/v1/recover', {
      method: 'POST',
      headers: supabaseHeaders(),
      body: JSON.stringify({ email: email, redirect_to: window.location.origin + '/book-market/auth.html' }),
    });
    if (!res.ok) {
      var data = await res.json();
      throw new Error(data.msg || data.error_description || '发送失败');
    }
    showToast('📧 密码重置链接已发送到你的邮箱');
  } catch (err) {
    showToast('❌ ' + err.message, true);
  }

  this.disabled = false;
  this.textContent = '忘记密码？';
});

/* 表单提交绑定 */
document.getElementById('loginForm').addEventListener('submit', function(e) { e.preventDefault(); handleLogin(); });
document.getElementById('registerForm').addEventListener('submit', function(e) { e.preventDefault(); handleRegister(); });

/* 页面初始化：已登录则直接跳转 */
(function() {
  for (var key in localStorage) {
    if (key.indexOf('sb-') === 0 && key.indexOf('-auth-token') > 0) {
      try {
        var data = JSON.parse(localStorage.getItem(key));
        if (data && data.access_token) {
          window.location.href = getRedirectUrl();
        }
      } catch(e) {}
      break;
    }
  }
})();
</script>
</body>
</html>
