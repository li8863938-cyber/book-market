          <!-- е“Ғзӣё -->

            <div class="select-wrap">
              <select id="condition" name="condition" required
                      class="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm outline-none transition-all bg-slate-50 focus:border-indigo-500 focus:ring-3 focus:ring-indigo-500/10 focus:bg-white text-slate-800 cursor-pointer">
                <option value="" disabled selected>иҜ·йҖүжӢ©е“Ғзӣё</option>
                <option value="е…Ёж–°">е…Ёж–°</option>
                <option value="д№қжҲҗж–?>д№қжҲҗж–?/option>
                <option value="е…«жҲҗж–?>е…«жҲҗж–?/option>
                <option value="жңүз¬”и®?>жңүз¬”и®?/option>

          <!-- дәӨжҳ“ең°зӮ№ -->

                <option value="" disabled selected>иҜ·йҖүжӢ©дәӨжҳ“ең°зӮ№</option>
                <option value="еӣҫд№ҰйҰ?>еӣҫд№ҰйҰ?/option>

          <!-- иҒ”зі»ж–№ејҸ -->

  <!-- ===== Toast ===== -->
  <div class="toast" id="toast"></div>

  <script>
    /* =============================================================
     * Supabase REST API й…ҚзҪ®пјҲж— йңҖеӨ–йғЁ SDK CDNпј?     * ============================================================= */
    var SUPABASE_URL = 'https://zqhzigukoidwcbhzkysk.supabase.co';
    var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpxaHppZ3Vrb2lkd2NiaHpreXNrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3MDg1ODIsImV4cCI6MjA5NTI4NDU4Mn0.4WSfOD7UAnbxF1zDGMihcs-eo6cneBYRWPyLLiOkhdQ';

    function supabaseHeaders(token) {
      return { 'apikey': SUPABASE_ANON_KEY, 'Authorization': 'Bearer ' + (token || SUPABASE_ANON_KEY), 'Content-Type': 'application/json' };
    }

    /* д»?localStorage иҜ»еҸ– Supabase session */
    function getStoredSession() {
      for (var key in localStorage) {
        if (key.indexOf('sb-') === 0 && key.indexOf('-auth-token') > 0) {
          try { var d = JSON.parse(localStorage.getItem(key)); if (d && d.access_token) return d; } catch(e) {}
        }
      }
      return null;
    }

    /* =============================================================
     * DOM еј•з”Ё
     * ============================================================= */
    var $ = function(id) { return document.getElementById(id); };
    var form = $('sellForm');
    var submitBtn = $('submitBtn');
    var toastEl = $('toast');
    var coverUrl = $('cover_url');
    var coverPreview = $('coverPreview');
    var coverPreviewImg = $('coverPreviewImg');
    var descTextarea = $('description');
    var descCount = $('descCount');
    var _toastTimer = null;

    /* =============================================================
     * е·Ҙе…·еҮҪж•°
     * ============================================================= */
    function showToast(msg, type) {
      type = type || 'info';
      toastEl.textContent = msg;
      toastEl.className = 'toast ' + type;
      void toastEl.offsetWidth;
      toastEl.classList.add('show');
      clearTimeout(_toastTimer);
      _toastTimer = setTimeout(function() { toastEl.classList.remove('show'); }, 3000);
    }

    function setLoading(loading) {
      submitBtn.disabled = loading;
      submitBtn.innerHTML = loading ? '<span class="spinner"></span> еҸ‘еёғдёӯвҖ? : 'еҸ‘еёғеӣҫд№Ұ';
    }

    /* =============================================================
     * е°Ғйқў URL е®һж—¶йў„и§Ҳ
     * ============================================================= */
    coverUrl.addEventListener('input', function() {
      var val = this.value.trim();
      if (val && (val.indexOf('http://') === 0 || val.indexOf('https://') === 0)) {
        coverPreviewImg.src = val;
        coverPreview.classList.remove('hidden');
      } else {
        coverPreview.classList.add('hidden');
      }
    });

    /* =============================================================
     * жҸҸиҝ°еӯ—ж•°з»ҹи®Ў
     * ============================================================= */
    descTextarea.addEventListener('input', function() {
      var len = this.value.length;
      descCount.textContent = len;
      if (len > 500) { this.value = this.value.substring(0, 500); descCount.textContent = 500; }
    });

    /* =============================================================
     * жү«з ҒжҢүй’®йў„з•ҷ
     * ============================================================= */
    $('scanBtn').addEventListener('click', function() {
      showToast('рҹ“· жү«з ҒеҠҹиғҪеҚіе°ҶдёҠзәҝпјҢж•¬иҜ·жңҹеҫ?, 'info');
    });

    /* =============================================================
     * жЈҖжҹҘзҷ»еҪ•зҠ¶жҖ?     * ============================================================= */
    function checkAuth() {
      var session = getStoredSession();
      if (!session) {
        showToast('вҸ?иҜ·е…Ҳзҷ»еҪ•', 'info');
        setTimeout(function() { window.location.href = 'auth.html?redirect=sell.html'; }, 1200);
        return null;
      }
      return session;
    }

    /* =============================================================
     * иЎЁеҚ•жҸҗдәӨпјҲREST APIпј?     * ============================================================= */
    form.addEventListener('submit', async function(e) {
      e.preventDefault();

      var session = getStoredSession();
      if (!session) { checkAuth(); return; }

      var title = $('title').value.trim();
      var author = $('author').value.trim();
      var publisher = $('publisher').value.trim() || null;
      var isbn = $('isbn').value.trim() || null;
      var cover_url = coverUrl.value.trim() || null;
      var original_price = $('original_price').value ? parseFloat($('original_price').value) : null;
      var price = parseFloat($('price').value);
      var condition = $('condition').value;
      var location = $('location').value;
      var contact = $('contact').value.trim() || null;
      var description = descTextarea.value.trim() || null;

      if (!title)  { showToast('иҜ·иҫ“е…Ҙд№Ұеҗ?, 'error'); $('title').focus(); return; }
      if (!author) { showToast('иҜ·иҫ“е…ҘдҪңиҖ?, 'error'); $('author').focus(); return; }
      if (!price || price <= 0) { showToast('иҜ·иҫ“е…Ҙжңүж•Ҳе”®д»?, 'error'); $('price').focus(); return; }
      if (!condition) { showToast('иҜ·йҖүжӢ©е“Ғзӣё', 'error'); return; }
      if (!location)  { showToast('иҜ·йҖүжӢ©дәӨжҳ“ең°зӮ№', 'error'); return; }

      var finalPrice = Math.round(price * 100) / 100;
      var finalOriginal = original_price ? Math.round(original_price * 100) / 100 : null;

      var bookData = {
        title: title,
        author: author,
        publisher: publisher,
        isbn: isbn,
        cover_url: cover_url,
        original_price: finalOriginal,
        price: finalPrice,
        condition: condition,
        location: location,
        contact: contact,
        description: description,
        user_id: session.user.id,
        status: 'еңЁе”®',
        created_at: new Date().toISOString(),
      };

      setLoading(true);

      try {
        /* REST APIпјҡPOST /rest/v1/books */
        var res = await fetch(SUPABASE_URL + '/rest/v1/books', {
          method: 'POST',
          headers: supabaseHeaders(session.access_token),
          body: JSON.stringify(bookData),
        });

        if (!res.ok) {
          var errBody = await res.text();
          throw new Error(errBody || 'HTTP ' + res.status);
        }

        showToast('вң?еҸ‘еёғжҲҗеҠҹпј?, 'success');
        setTimeout(function() { window.location.href = 'index.html'; }, 1200);
      } catch (err) {
        console.error('еҸ‘еёғеӨұиҙҘ:', err);
        showToast('вқ?еҸ‘еёғеӨұиҙҘпј? + (err.message || 'жңӘзҹҘй”ҷиҜҜ'), 'error');
        setLoading(false);
      }
    });

    /* =============================================================
     * йЎөйқўеҲқе§ӢеҢ–пјҡжЈҖжҹҘзҷ»еҪ?     * ============================================================= */
    (function() {
      var session = getStoredSession();
      if (!session) {
        showToast('вҸ?иҜ·е…Ҳзҷ»еҪ•', 'info');
        setTimeout(function() { window.location.href = 'auth.html?redirect=sell.html'; }, 1200);
      }
    })();
  </script>
</body>
